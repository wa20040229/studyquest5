<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyQuest Ver9.1</title>
<style>
*{box-sizing:border-box}
:root{
  --bg:#0f172a;
  --card:#111827;
  --main:#38bdf8;
  --blue:#2563eb;
  --text:#f8fafc;
  --muted:#94a3b8;
  --line:#334155;
  --green:#22c55e;
  --red:#ef4444;
  --orange:#f59e0b;
}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;
  background:linear-gradient(180deg,#020617 0%,#0f172a 260px);
  color:var(--text);
}
header{
  background:linear-gradient(135deg,#020617,#1e3a8a,#0369a1);
  color:white;
  padding:24px 14px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.45);
}
header h1{margin:0;font-size:28px}
header p{margin:7px 0 0;font-size:14px;color:#cbd5e1}
.container{max-width:1120px;margin:auto;padding:14px}
.main-tabs{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:10px 0 12px;
  position:sticky;
  top:0;
  background:rgba(15,23,42,.92);
  backdrop-filter:blur(10px);
  z-index:10;
  border-bottom:1px solid var(--line);
}
.main-tabs button{
  flex:0 0 auto;
  width:auto;
  margin:0;
  padding:10px 14px;
  border-radius:12px;
  background:#111827;
  color:#cbd5e1;
  border:1px solid var(--line);
  box-shadow:none;
}
.main-tabs button.active{
  background:linear-gradient(135deg,#2563eb,#38bdf8);
  color:white;
  border-color:#38bdf8;
}
.tab{display:none}
.tab.active{display:block}
.box{
  background:rgba(17,24,39,.96);
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 14px 32px rgba(0,0,0,.28);
  overflow:hidden;
}
h2{margin:0 0 14px;font-size:21px;color:#e0f2fe}
h3{
  margin:18px 0 10px;
  font-size:16px;
  color:#93c5fd;
  border-left:4px solid var(--main);
  padding-left:9px;
}
label{display:block;font-weight:700;margin-top:12px;color:#dbeafe;font-size:14px}
input,select,textarea{
  width:100%;
  max-width:100%;
  min-width:0;
  padding:12px 13px;
  margin-top:6px;
  border:1px solid #475569;
  border-radius:12px;
  font-size:16px;
  background:#020617;
  color:#f8fafc;
  outline:none;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--main);
  box-shadow:0 0 0 3px rgba(56,189,248,.18);
}
input[type="date"]{
  display:block;
  width:100%;
  max-width:100%;
  min-width:0;
  -webkit-appearance:none;
  appearance:none;
  height:48px;
  overflow:hidden;
}
button{
  width:100%;
  max-width:100%;
  min-width:0;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  background:linear-gradient(135deg,#2563eb,#0284c7);
  color:white;
  box-shadow:0 8px 18px rgba(37,99,235,.22);
}
.btn-red{background:var(--red);box-shadow:none}
.btn-gray{background:#475569;box-shadow:none}
.btn-orange{background:var(--orange);box-shadow:none}
.btn-small{
  width:auto;
  padding:7px 10px;
  font-size:12px;
  border-radius:9px;
  margin:2px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  gap:12px;
}
.stat{
  background:linear-gradient(180deg,#1f2937,#111827);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
}
.stat strong{
  display:block;
  margin-top:4px;
  font-size:24px;
  color:#7dd3fc;
}
.sub-tabs,.person-filter{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:8px 0 14px;
}
.sub-tabs button,.person-filter button{
  width:auto;
  padding:8px 13px;
  background:#020617;
  color:#cbd5e1;
  border:1px solid var(--line);
  box-shadow:none;
  border-radius:999px;
}
.sub-tabs button.active,.person-filter button.active{
  background:#0284c7;
  color:white;
  border-color:#38bdf8;
}
.task{
  border:1px solid #1d4ed8;
  border-left:5px solid var(--main);
  background:#0b1220;
  border-radius:14px;
  padding:12px;
  margin:9px 0;
}
.task.done{
  border-color:#15803d;
  border-left-color:var(--green);
  background:#052e1a;
}
.edit-notice{
  background:#451a03;
  border:1px solid #f59e0b;
  color:#fed7aa;
  border-radius:12px;
  padding:10px;
  margin-bottom:12px;
  font-weight:700;
}
.small{font-size:12px;color:var(--muted)}
.table-wrap{
  overflow-x:auto;
  border:1px solid var(--line);
  border-radius:14px;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
  background:#111827;
}
th{
  background:#020617;
  color:#bae6fd;
  font-weight:800;
}
th,td{
  border-bottom:1px solid var(--line);
  padding:9px;
  text-align:left;
  vertical-align:top;
}
.week-header{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  text-align:center;
  font-weight:800;
  color:#cbd5e1;
  margin:12px 0 4px;
}
.week-header div{
  padding:6px 0;
  border:1px solid var(--line);
  background:#020617;
}
.week-header .sun{color:#fca5a5}
.week-header .sat{color:#93c5fd}
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:3px;
}
.day{
  background:#111827;
  border:1px solid var(--line);
  border-radius:8px;
  min-height:96px;
  padding:5px;
  font-size:10px;
  overflow:hidden;
}
.day.today{
  border:2px solid var(--main);
  box-shadow:0 0 0 2px rgba(56,189,248,.18);
}
.day-num{font-weight:900;color:#e0f2fe;margin-bottom:3px;font-size:12px}
.day.sun .day-num{color:#fca5a5}
.day.sat .day-num{color:#93c5fd}
.day.outside{opacity:.35}
.plan,.done,.exam-mark{
  border-radius:5px;
  padding:2px 3px;
  margin:2px 0;
  line-height:1.25;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}
.plan{background:#082f49;border:1px solid #0284c7;color:#e0f2fe}
.done{background:#052e16;border:1px solid #16a34a;color:#dcfce7}
.exam-mark{background:#450a0a;border:1px solid #ef4444;color:#fee2e2}
.calendar-legend{
  display:flex;
  gap:16px;
  align-items:center;
  flex-wrap:wrap;
  margin-top:12px;
  padding:10px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#111827;
  font-weight:700;
}
.legend-box{
  width:15px;
  height:15px;
  display:inline-block;
  border-radius:4px;
  margin-right:6px;
  vertical-align:-2px;
}
.legend-plan{background:#0284c7}
.legend-done{background:#16a34a}
.legend-exam{background:#ef4444}
.day-list .list-row{
  border:1px solid var(--line);
  background:#111827;
  border-radius:12px;
  padding:10px;
  margin:8px 0;
}
.day-list-date{
  font-weight:900;
  color:#e0f2fe;
  margin-bottom:6px;
}
.day-list-date.sun{color:#fca5a5}
.day-list-date.sat{color:#93c5fd}
.bar-wrap{
  background:#020617;
  border:1px solid #334155;
  border-radius:999px;
  overflow:hidden;
  height:22px;
}
.bar{
  background:linear-gradient(90deg,#2563eb,#38bdf8);
  height:22px;
  color:white;
  font-size:12px;
  text-align:right;
  padding-right:7px;
  line-height:22px;
  white-space:nowrap;
}
textarea{resize:vertical}

.ranking-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
}
.rank-card{
  background:linear-gradient(180deg,#1f2937,#0b1220);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
}
.rank-title{
  font-weight:900;
  color:#e0f2fe;
  margin-bottom:4px;
}
.rank-badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  background:#0284c7;
  color:white;
  font-size:12px;
  font-weight:900;
  margin-bottom:6px;
}
.import-warning{
  background:#450a0a;
  border:1px solid #ef4444;
  color:#fee2e2;
  border-radius:12px;
  padding:10px;
  margin:10px 0;
  font-size:13px;
}


.complete-btn{
  width:auto;
  padding:7px 11px;
  font-size:12px;
  border-radius:999px;
  margin-top:8px;
  background:linear-gradient(135deg,#16a34a,#22c55e);
  box-shadow:none;
}
.complete-btn.done-already{
  background:#475569;
  color:#cbd5e1;
}
.file-row{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
  margin-top:8px;
}
input[type="file"]{
  background:#020617;
  border:1px dashed #475569;
}

@media(max-width:700px){
  header h1{font-size:23px}
  .container{padding:10px}
  .box{padding:14px;border-radius:15px}
  th,td{font-size:12px;padding:7px}
  .main-tabs{padding:9px 0}
  .main-tabs button{font-size:13px;padding:9px 12px}
  .calendar{grid-template-columns:repeat(7,1fr);gap:2px}
  .day{min-height:76px;padding:3px;font-size:9px;border-radius:7px}
  .day-num{font-size:11px}
  .plan,.done,.exam-mark{font-size:8px;padding:1px 2px;-webkit-line-clamp:1}
  .week-header div{font-size:12px;padding:4px 0}
}
</style>
</head>

<body>
<header>
  <h1>StudyQuest Ver9.1</h1>
  <p>今日やること・教材管理・教科別グラフ・カレンダー</p>
</header>

<div class="container">

<div class="main-tabs">
  <button class="active" onclick="showTab('todayTab',this)">今日やること</button>
  <button onclick="showTab('materialTab',this)">教材管理</button>
  <button onclick="showTab('recordTab',this)">勉強記録</button>
  <button onclick="showTab('calendarTab',this)">カレンダー</button>
  <button onclick="showTab('graphTab',this)">グラフ</button>
  <button onclick="showTab('examTab',this)">試験モード</button>
  <button onclick="showTab('manageTab',this)">記録管理</button>
</div>

<section id="todayTab" class="tab active">
  <div class="box">
    <h2>今日やること</h2>
    <div id="todayPersonFilter" class="person-filter"></div>
    <div id="todayTasks"></div>
  </div>

  <div class="box">
    <h2>ダッシュボード</h2>
    <div id="dashboardPersonFilter" class="person-filter"></div>
    <div class="grid" id="dashboard"></div>
  </div>

  <div class="box">
    <h2>レインボー6風ランキング</h2>
    <p class="small">全期間の勉強時間でランキングします。</p>
    <div id="rainbowRanking" class="ranking-grid"></div>
  </div>
</section>

<section id="materialTab" class="tab">
  <div class="box">
    <h2 id="materialFormTitle">教材管理</h2>
    <div id="materialEditNotice"></div>
    <div id="materialPersonFilter" class="person-filter"></div>

    <label>名前</label>
    <select id="materialPerson"></select>

    <label>教科</label>
    <select id="materialSubject"></select>

    <label>教材名</label>
    <input id="materialName" placeholder="例：数学ワーク">

    <label>総量</label>
    <input type="number" id="materialTotal" min="1" placeholder="例：120">

    <label>単位</label>
    <input id="materialUnit" placeholder="例：ページ、問、単語">

    <label>1単位あたりの目安時間（分）</label>
    <input id="materialMinutesPerUnit" type="number" min="1" placeholder="例：1ページ5分、1問3分">

    <label>開始日</label>
    <input type="date" id="materialStart">

    <label>終了日</label>
    <input type="date" id="materialEnd">

    <label>試験日</label>
    <input type="date" id="materialExam">

    <button id="materialSaveButton" onclick="saveMaterial()">教材を登録</button>
    <button id="materialCancelButton" class="btn-gray" onclick="cancelMaterialEdit()" style="display:none;">修正をキャンセル</button>
  </div>

  <div class="box">
    <h2>教材一覧</h2>
    <div id="materialList"></div>
  </div>
</section>

<section id="recordTab" class="tab">
  <div class="box">
    <h2>勉強記録</h2>

    <h3>教材から入力</h3>

    <label>表示する名前</label>
    <select id="recordPersonFilter" onchange="refreshMaterialSelect()"></select>

    <label>表示する教科</label>
    <select id="recordSubjectFilter" onchange="refreshMaterialSelect()"></select>

    <label>教材</label>
    <select id="recordMaterial"></select>
    <p class="small" id="recordMaterialHelp"></p>

    <label>勉強時間（分）</label>
    <input type="number" id="materialMinutes" min="1">

    <label>日付</label>
    <input type="date" id="materialRecordDate">

    <label>メモ</label>
    <textarea id="materialMemo" rows="2"></textarea>

    <button onclick="addMaterialRecord()">教材で記録する</button>

    <h3>時間だけ入力</h3>
    <label>名前</label>
    <select id="quickPerson"></select>

    <label>教科</label>
    <select id="quickSubject"></select>

    <label>勉強時間（分）</label>
    <input type="number" id="quickMinutes" min="1">

    <label>日付</label>
    <input type="date" id="quickDate">

    <label>メモ</label>
    <textarea id="quickMemo" rows="2"></textarea>

    <button onclick="addQuickRecord()">時間だけ記録する</button>
  </div>
</section>

<section id="calendarTab" class="tab">
  <div class="box">
    <h2>カレンダー</h2>
    <div id="calendarPersonFilter" class="person-filter"></div>
    <div class="sub-tabs">
      <button onclick="moveMonth(-1)">前月</button>
      <button onclick="moveMonth(0)">今月</button>
      <button onclick="moveMonth(1)">次月</button>
      <button id="monthViewBtn" class="active" onclick="setCalendarView('month')">月表示</button>
      <button id="listViewBtn" onclick="setCalendarView('list')">30行表示</button>
    </div>
    <h3 id="calendarTitle"></h3>

    <div id="monthCalendarArea">
      <div class="week-header">
        <div class="sun">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="sat">土</div>
      </div>
      <div class="calendar" id="calendar"></div>
    </div>

    <div id="listCalendarArea" class="day-list" style="display:none;"></div>

    <div class="calendar-legend">
      <span><span class="legend-box legend-plan"></span>予定</span>
      <span><span class="legend-box legend-done"></span>実績</span>
      <span><span class="legend-box legend-exam"></span>試験日</span>
    </div>
  </div>
</section>

<section id="graphTab" class="tab">
  <div class="box">
    <h2>グラフ</h2>
    <div id="graphPersonFilter" class="person-filter"></div>
    <div class="sub-tabs">
      <button onclick="setRange('week')">1週間</button>
      <button onclick="setRange('month')">1ヶ月</button>
      <button onclick="setRange('year')">年間</button>
      <button onclick="setRange('all')">All</button>
    </div>
    <h3>教科別グラフ</h3>
    <div id="subjectGraph"></div>
    <h3>人別グラフ</h3>
    <div id="personGraph"></div>
  </div>
</section>

<section id="examTab" class="tab">
  <div class="box">
    <h2>試験モード</h2>
    <div id="examPersonFilter" class="person-filter"></div>
    <div id="examMode"></div>
  </div>
</section>

<section id="manageTab" class="tab">
  <div class="box">
    <h2>記録管理</h2>
    <div id="managePersonFilter" class="person-filter"></div>
    <p class="small">削除したい記録を選んで削除できます。</p>
    <div id="recordList"></div>
  </div>

  <div class="box">
    <h2>データ管理</h2>
    <button class="btn-gray" onclick="exportData()">エクスポート用データを表示</button>
    <button class="btn-gray" onclick="downloadBackupFile()">バックアップファイル保存</button>
    <textarea id="backupArea" rows="7" placeholder="ここにエクスポート用データが表示されます"></textarea>

    <h3>インポート</h3>
    <div class="import-warning">インポートすると、現在のデータは貼り付けたデータで置き換わります。必要なら先にエクスポートしてください。</div>
    <textarea id="importArea" rows="7" placeholder="ここにバックアップデータを貼り付けてください"></textarea>
    <button class="btn-orange" onclick="importData()">テキストからインポートする</button>

    <h3>ファイルから復元</h3>
    <div class="file-row">
      <input id="backupFileInput" type="file" accept=".json,application/json" onchange="importBackupFile(event)">
    </div>
  </div>
</section>

</div>

<script>
const SUBJECTS=["国語","数学","英語","理科","社会","その他"];
const PEOPLE=["けいと","みく","尚子"];
const STORAGE_KEY="studyquest_v8_data";

let state={records:[],materials:[]};
let currentRange="week";
let calendarDate=new Date();
let calendarView="month";
let editingMaterialId=null;

let filters={
  today:"all",
  dashboard:"all",
  material:"all",
  calendar:"all",
  graph:"all",
  exam:"all",
  manage:"all"
};

function formatDateLocal(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,"0");
  const day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

function parseDateLocal(str){
  const [y,m,d]=str.split("-").map(Number);
  return new Date(y,m-1,d);
}

function todayStr(){
  return formatDateLocal(new Date());
}

function uid(){
  if(window.crypto && crypto.randomUUID)return crypto.randomUUID();
  return "id_"+Date.now()+"_"+Math.random().toString(16).slice(2);
}
function normalizePerson(p){
  if(p==="息子")return "けいと";
  if(p==="娘")return "みく";
  if(p==="自分")return "尚子";
  return p||"尚子";
}
function load(){
  const saved=localStorage.getItem(STORAGE_KEY);
  if(saved){try{state=JSON.parse(saved)}catch(e){state={records:[],materials:[]}}}

  state.records=(state.records||[]).map(r=>({
    id:r.id||uid(),
    person:normalizePerson(r.person||r.user),
    subject:r.subject||"その他",
    minutes:Number(r.minutes||r.time||0),
    date:r.date||todayStr(),
    memo:r.memo||"",
    materialId:r.materialId||null,
    materialName:r.materialName||r.material||"時間だけ入力",
    completedPlanKey:r.completedPlanKey||""
  }));

  state.materials=(state.materials||[]).map(m=>({
    id:m.id||uid(),
    person:normalizePerson(m.person||m.user),
    subject:m.subject||"その他",
    name:m.name||m.title||"教材",
    total:Number(m.total||0),
    unit:m.unit||"",
    minutesPerUnit:Number(m.minutesPerUnit||10),
    start:m.start||m.startDate||todayStr(),
    end:m.end||m.endDate||m.exam||todayStr(),
    exam:m.exam||m.examDate||m.end||todayStr()
  }));

  save();
}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function showTab(id,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".main-tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderAll();
}
function fillSelect(id,items){
  const el=document.getElementById(id);
  el.innerHTML="";
  items.forEach(x=>{
    const op=document.createElement("option");
    op.value=x;
    op.textContent=x;
    el.appendChild(op);
  });
}
function initForms(){
  ["quickPerson","materialPerson"].forEach(id=>fillSelect(id,PEOPLE));
  ["quickSubject","materialSubject"].forEach(id=>fillSelect(id,SUBJECTS));
  fillSelect("recordPersonFilter",["全員",...PEOPLE]);
  fillSelect("recordSubjectFilter",["全教科",...SUBJECTS]);
  document.getElementById("quickDate").value=todayStr();
  document.getElementById("materialRecordDate").value=todayStr();
  document.getElementById("materialStart").value=todayStr();
  document.getElementById("materialEnd").value=todayStr();
  document.getElementById("materialExam").value=todayStr();
}
function renderPersonFilter(elId,key){
  const el=document.getElementById(elId);
  const items=[["all","全員"],...PEOPLE.map(p=>[p,p])];
  el.innerHTML=items.map(([v,label])=>
    `<button class="${filters[key]===v?'active':''}" onclick="setFilter('${key}','${v}')">${label}</button>`
  ).join("");
}
function setFilter(key,value){filters[key]=value;renderAll()}
function personOk(person,key){return filters[key]==="all" || person===filters[key]}
function filterByPerson(list,key){return list.filter(x=>personOk(x.person,key))}

function refreshMaterialSelect(){
  const el=document.getElementById("recordMaterial");
  const help=document.getElementById("recordMaterialHelp");
  if(!el)return;

  const personFilter=document.getElementById("recordPersonFilter")?.value || "全員";

function sumMinutes(records){return records.reduce((a,b)=>a+Number(b.minutes||0),0)}
function inRange(dateStr){
  if(currentRange==="all")return true;
  const d=new Date(dateStr);
  const now=new Date();
  const diff=(now-d)/(1000*60*60*24);
  if(currentRange==="week")return diff>=0 && diff<7;
  if(currentRange==="month")return diff>=0 && diff<31;
  if(currentRange==="year")return diff>=0 && diff<366;
  return true;
}
function dateKey(d){return formatDateLocal(d)}
function calcInclusiveDays(startStr,endStr){
  const start=parseDateLocal(startStr);
  const end=parseDateLocal(endStr);
  return Math.max(1,Math.round((end-start)/(1000*60*60*24))+1);
}
function calcPerDay(material){
  const days=calcInclusiveDays(material.start,material.end);
  return Math.ceil(Number(material.total||0)/days);
}
function getDayItems(dateStr,key="calendar"){
  const plans=[];
  const exams=[];
  const recs=state.records.filter(r=>r.date===dateStr && personOk(r.person,key));

  state.materials.filter(m=>personOk(m.person,key)).forEach(m=>{
    if(m.exam===dateStr)exams.push(`${m.person}｜${m.subject} ${m.name}`);

    const start=parseDateLocal(m.start);
    const end=parseDateLocal(m.end);
    const target=parseDateLocal(dateStr);
    if(target<start||target>end)return;

    const days=calcInclusiveDays(m.start,m.end);
    const per=Math.ceil(m.total/days);
    const dayIndex=Math.round((target-start)/(1000*60*60*24));
    const from=dayIndex*per+1;
    const to=Math.min(m.total,(dayIndex+1)*per);

    if(from<=m.total){
      const count=Math.max(0,to-from+1);
      const minutes=count*Number(m.minutesPerUnit||10);
      plans.push({
        materialId:m.id,
        person:m.person,
        subject:m.subject,
        name:m.name,
        unit:m.unit,
        from,
        to,
        count,
        minutes,
        date:dateStr,
        text:`${m.person}｜${m.subject} ${m.name} ${from}〜${to}${m.unit}`
      });
    }
  });

  return {plans,recs,exams};
}

function completedPlanKey(materialId,dateStr,from,to){
  return `${materialId}_${dateStr}_${from}_${to}`;
}

function isPlanCompleted(plan){
  const key=completedPlanKey(plan.materialId,plan.date,plan.from,plan.to);
  return state.records.some(r=>
    r.completedPlanKey===key ||
    (
      r.materialId===plan.materialId &&
      r.date===plan.date &&
      (r.memo||"").includes(`予定完了:${plan.from}-${plan.to}`)
    )
  );
}

function completePlan(materialId,dateStr,from,to,minutes){
  const m=state.materials.find(x=>x.id===materialId);
  if(!m){
    alert("教材が見つかりません");
    return;
  }

  const key=completedPlanKey(materialId,dateStr,from,to);
  const already=state.records.some(r=>
    r.completedPlanKey===key ||
    (
      r.materialId===materialId &&
      r.date===dateStr &&
      (r.memo||"").includes(`予定完了:${from}-${to}`)
    )
  );

  if(already){
    alert("この予定はすでに完了済みです");
    return;
  }

  const defaultMinutes=Number(minutes||30);
  const input=prompt("実際の勉強時間（分）を入力してください", String(defaultMinutes));
  if(input===null)return;

  const actualMinutes=Number(String(input).trim());
  if(!actualMinutes || actualMinutes<=0){
    alert("勉強時間を正しく入力してください");
    return;
  }

  state.records.push({
    id:uid(),
    person:m.person,
    subject:m.subject||"その他",
    minutes:actualMinutes,
    date:dateStr,
    memo:`予定完了:${from}-${to} ${from}〜${to}${m.unit}`,
    materialId:m.id,
    materialName:m.name,
    completedPlanKey:key
  });

  save();
  load();
  renderAll();
  alert(`${actualMinutes}分を勉強記録に反映しました`);
}

function planHtml(plan,showButton=true){
  const completed=isPlanCompleted(plan);
  const btn=showButton
    ? `<br><button class="complete-btn ${completed?'done-already':''}" onclick="completePlan('${plan.materialId}','${plan.date}',${plan.from},${plan.to},${plan.minutes})">${completed?'完了済み':'完了して記録'}</button>`
    : "";
  return `${plan.text}<br><span class="small">目安 ${plan.minutes}分</span>${btn}`;
}

function renderMonthCalendar(y,m){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";
  const start=new Date(y,m,1-new Date(y,m,1).getDay());

  for(let i=0;i<42;i++){
    const d=new Date(start);
    d.setDate(start.getDate()+i);
    const key=dateKey(d);
    const items=getDayItems(key,"calendar");
    const todayClass=key===todayStr()?"today":"";
    const outside=d.getMonth()!==m?"outside":"";
    const dow=d.getDay();
    const dowClass=dow===0?"sun":dow===6?"sat":"";

    let html=`<div class="day ${todayClass} ${outside} ${dowClass}"><div class="day-num">${d.getDate()}</div>`;
    items.exams.slice(0,1).forEach(x=>html+=`<div class="exam-mark">試験：${x}</div>`);
    items.plans.slice(0,2).forEach(x=>html+=`<div class="plan">${x.text}</div>`);
    items.recs.slice(0,2).forEach(r=>html+=`<div class="done">${r.person}｜${r.subject} ${r.minutes}分</div>`);
    const extra=items.exams.length+items.plans.length+items.recs.length-5;
    if(extra>0)html+=`<div class="small">他${extra}件</div>`;
    html+="</div>";
    cal.innerHTML+=html;
  }
}
function renderListCalendar(y,m){
  const el=document.getElementById("listCalendarArea");
  let html="";
  for(let i=1;i<=30;i++){
    const d=new Date(y,m,i);
    if(d.getMonth()!==m)break;
    const key=dateKey(d);
    const dow=d.getDay();
    const dowClass=dow===0?"sun":dow===6?"sat":"";
    const items=getDayItems(key,"calendar");

    html+=`<div class="list-row"><div class="day-list-date ${dowClass}">${i}日（${["日","月","火","水","木","金","土"][dow]}）</div>`;

  try{
    data=JSON.parse(text);
  }catch(e){
    alert("JSON形式が正しくありません");
    return;
  }

  if(!data || !Array.isArray(data.records) || !Array.isArray(data.materials)){
    alert("StudyQuestのバックアップデータではない可能性があります");
    return;
  }

  if(!confirm("現在のデータをインポートデータで置き換えます。よろしいですか？")){
    return;
  }

  state=data;
  loadImportedData();
  save();
  renderAll();
  alert("インポートしました");
}

function loadImportedData(){
  state.records=(state.records||[]).map(r=>({
    id:r.id||uid(),
    person:normalizePerson(r.person||r.user),
    subject:r.subject||"その他",
    minutes:Number(r.minutes||r.time||0),
    date:r.date||todayStr(),
    memo:r.memo||"",
    materialId:r.materialId||null,
    materialName:r.materialName||r.material||"時間だけ入力",
    completedPlanKey:r.completedPlanKey||""
  }));

  state.materials=(state.materials||[]).map(m=>({
    id:m.id||uid(),
    person:normalizePerson(m.person||m.user),
    subject:m.subject||"その他",
    name:m.name||m.title||"教材",
    total:Number(m.total||0),
    unit:m.unit||"",
    minutesPerUnit:Number(m.minutesPerUnit||10),
    start:m.start||m.startDate||todayStr(),
    end:m.end||m.endDate||m.exam||todayStr(),
    exam:m.exam||m.examDate||m.end||todayStr()
  }));
}
function renderAll(){
  renderPersonFilter("todayPersonFilter","today");
  renderPersonFilter("dashboardPersonFilter","dashboard");
  renderPersonFilter("materialPersonFilter","material");
  renderPersonFilter("calendarPersonFilter","calendar");
  renderPersonFilter("graphPersonFilter","graph");
  renderPersonFilter("examPersonFilter","exam");
  renderPersonFilter("managePersonFilter","manage");
  refreshMaterialSelect();
  renderToday();
  renderDashboard();
  renderRainbowRanking();
  renderMaterialList();
  renderSubjectGraph();
  renderCalendar();
  renderExamMode();
  renderRecordList();
}
load();
initForms();
renderAll();
</script>
</body>
