```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyQuest Ver8.0</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;
  background:#f4f6fb;
  color:#222;
}
header{
  background:linear-gradient(135deg,#5b7cfa,#8b5cf6);
  color:white;
  padding:18px 14px;
  text-align:center;
}
header h1{margin:0;font-size:26px}
header p{margin:6px 0 0;font-size:14px}
.container{max-width:1100px;margin:auto;padding:12px}
.tabs{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:10px 0;
  position:sticky;
  top:0;
  background:#f4f6fb;
  z-index:10;
}
.tab-btn{
  flex:0 0 auto;
  width:auto;
  border:none;
  border-radius:999px;
  padding:10px 14px;
  background:#e5e7eb;
  color:#333;
  font-weight:bold;
  font-size:14px;
}
.tab-btn.active{
  background:#5b7cfa;
  color:white;
}
.tab{display:none}
.tab.active{display:block}
.box{
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  overflow:hidden;
}
h2{margin:0 0 12px;font-size:20px}
h3{margin:16px 0 8px;font-size:17px}
label{display:block;font-weight:bold;margin-top:10px}
input,select,textarea,button{
  width:100%;
  max-width:100%;
  min-width:0;
  padding:11px;
  margin-top:5px;
  border:1px solid #d6d9e3;
  border-radius:10px;
  font-size:16px;
}
input[type="date"]{
  display:block;
  width:100%;
  max-width:100%;
  min-width:0;
  -webkit-appearance:none;
  appearance:none;
  height:48px;
  overflow:hidden;
}
button{
  background:#5b7cfa;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
button:hover{opacity:.9}
.btn-red{background:#ef4444}
.btn-green{background:#22c55e}
.btn-gray{background:#64748b}
.btn-small{
  width:auto;
  padding:7px 10px;
  font-size:13px;
  margin:2px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  gap:10px;
}
.card{
  background:#eef2ff;
  border-radius:14px;
  padding:12px;
}
.card strong{font-size:22px}
.person-filter{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin:8px 0 12px;
}
.person-filter button{
  width:auto;
  padding:8px 12px;
  background:#e5e7eb;
  color:#333;
}
.person-filter button.active{
  background:#5b7cfa;
  color:white;
}
.task{
  border-left:5px solid #5b7cfa;
  background:#f8fafc;
  border-radius:10px;
  padding:10px;
  margin:8px 0;
}
.task.done{border-left-color:#22c55e;background:#f0fdf4}
.small{font-size:12px;color:#666}
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th,td{
  border-bottom:1px solid #e5e7eb;
  padding:8px;
  text-align:left;
  vertical-align:top;
}
.table-wrap{overflow-x:auto}
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}
.day{
  background:white;
  border:1px solid #e5e7eb;
  border-radius:10px;
  min-height:110px;
  padding:6px;
  font-size:12px;
  overflow:hidden;
}
.day.today{border:3px solid #5b7cfa}
.day-num{font-weight:bold;margin-bottom:4px}
.plan{background:#dbeafe;border-radius:5px;padding:3px;margin:2px 0}
.done-item{background:#dcfce7;border-radius:5px;padding:3px;margin:2px 0}
.bar-wrap{
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
  height:22px;
}
.bar{
  background:#5b7cfa;
  height:22px;
  color:white;
  text-align:right;
  padding-right:6px;
  font-size:12px;
  white-space:nowrap;
}
@media(max-width:700px){
  header h1{font-size:22px}
  .container{padding:10px}
  .calendar{grid-template-columns:repeat(2,1fr)}
  th,td{font-size:12px;padding:6px}
}
</style>
</head>

<body>
<header>
  <h1>StudyQuest Ver8.0</h1>
  <p>今日やること・教材管理・教科別グラフ・カレンダー</p>
</header>

<div class="container">

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('today',this)">今日やること</button>
  <button class="tab-btn" onclick="showTab('materials',this)">教材管理</button>
  <button class="tab-btn" onclick="showTab('record',this)">勉強記録</button>
  <button class="tab-btn" onclick="showTab('calendar',this)">カレンダー</button>
  <button class="tab-btn" onclick="showTab('graph',this)">グラフ</button>
  <button class="tab-btn" onclick="showTab('exam',this)">試験モード</button>
  <button class="tab-btn" onclick="showTab('manage',this)">記録管理</button>
</div>

<section id="today" class="tab active">
  <div class="box">
    <h2>今日やること</h2>
    <div id="todayFilter" class="person-filter"></div>
    <div class="grid" id="todaySummary"></div>
    <h3>今日の予定</h3>
    <div id="todayTasks"></div>
  </div>
</section>

<section id="materials" class="tab">
  <div class="box">
    <h2>教材管理</h2>
    <div id="materialsFilter" class="person-filter"></div>

    <label>名前</label>
    <select id="materialPerson"></select>

    <label>教科</label>
    <select id="materialSubject"></select>

    <label>教材名</label>
    <input id="materialName" placeholder="例：数学ワーク">

    <label>総量</label>
    <input id="materialTotal" type="number" min="1" placeholder="例：120">

    <label>単位</label>
    <input id="materialUnit" placeholder="例：ページ、問、単語">

    <label>開始日</label>
    <input id="materialStart" type="date">

    <label>終了日</label>
    <input id="materialEnd" type="date">

    <label>試験日</label>
    <input id="materialExam" type="date">

    <button onclick="addMaterial()">教材を登録</button>
  </div>

  <div class="box">
    <h2>教材一覧</h2>
    <div id="materialList"></div>
  </div>
</section>

<section id="record" class="tab">
  <div class="box">
    <h2>勉強記録</h2>

    <h3>教材から入力</h3>
    <label>教材</label>
    <select id="recordMaterial"></select>

    <label>勉強時間（分）</label>
    <input id="materialMinutes" type="number" min="1">

    <label>日付</label>
    <input id="materialRecordDate" type="date">

    <label>メモ</label>
    <textarea id="materialMemo" rows="2"></textarea>

    <button onclick="addMaterialRecord()">教材で記録する</button>

    <h3>時間だけ入力</h3>
    <label>名前</label>
    <select id="quickPerson"></select>

    <label>教科</label>
    <select id="quickSubject"></select>

    <label>勉強時間（分）</label>
    <input id="quickMinutes" type="number" min="1">

    <label>日付</label>
    <input id="quickDate" type="date">

    <label>メモ</label>
    <textarea id="quickMemo" rows="2"></textarea>

    <button onclick="addQuickRecord()">時間だけ記録する</button>
  </div>
</section>

<section id="calendar" class="tab">
  <div class="box">
    <h2>カレンダー</h2>
    <div id="calendarFilter" class="person-filter"></div>
    <div class="grid">
      <button onclick="moveMonth(-1)">前月</button>
      <button onclick="moveMonth(0)">今月</button>
      <button onclick="moveMonth(1)">次月</button>
    </div>
    <h3 id="calendarTitle"></h3>
    <div id="calendarGrid" class="calendar"></div>
  </div>
</section>

<section id="graph" class="tab">
  <div class="box">
    <h2>グラフ</h2>
    <div id="graphFilter" class="person-filter"></div>
    <div class="grid">
      <button onclick="setGraphRange('week')">1週間</button>
      <button onclick="setGraphRange('month')">1ヶ月</button>
      <button onclick="setGraphRange('year')">年間</button>
      <button onclick="setGraphRange('all')">All</button>
    </div>

    <h3>教科別グラフ</h3>
    <div id="subjectGraph"></div>

    <h3>人別グラフ</h3>
    <div id="personGraph"></div>
  </div>
</section>

<section id="exam" class="tab">
  <div class="box">
    <h2>試験モード</h2>
    <div id="examFilter" class="person-filter"></div>
    <div id="examList"></div>
  </div>
</section>

<section id="manage" class="tab">
  <div class="box">
    <h2>記録管理</h2>
    <div id="manageFilter" class="person-filter"></div>
    <p class="small">削除したい記録だけを選んで削除できます。</p>
    <div id="recordList"></div>
  </div>

  <div class="box">
    <h2>バックアップ</h2>
    <button class="btn-gray" onclick="exportData()">バックアップを表示</button>
    <textarea id="backupArea" rows="6"></textarea>
  </div>
</section>

</div>

<script>
const PEOPLE=["けいと","みく","尚子"];
const SUBJECTS=["国語","数学","英語","理科","社会","その他"];
const STORAGE_KEY="studyquest_v8";

let state={materials:[],records:[]};
let filters={
  today:"all",
  materials:"all",
  calendar:"all",
  graph:"all",
  exam:"all",
  manage:"all"
};
let graphRange="week";
let calendarDate=new Date();

function todayStr(){
  return new Date().toISOString().slice(0,10);
}

function uuid(){
  if(window.crypto && crypto.randomUUID)return crypto.randomUUID();
  return "id_"+Date.now()+"_"+Math.random().toString(16).slice(2);
}

function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}

function load(){
  const saved=localStorage.getItem(STORAGE_KEY);
  if(saved){
    try{state=JSON.parse(saved)}catch(e){state={materials:[],records:[]}}
  }

  state.materials=(state.materials||[]).map(m=>({
    id:m.id||uuid(),
    person:m.person||m.user||"尚子",
    subject:m.subject||"その他",
    name:m.name||m.title||"教材",
    total:Number(m.total||0),
    unit:m.unit||"",
    start:m.start||m.startDate||todayStr(),
    end:m.end||m.endDate||m.exam||todayStr(),
    exam:m.exam||m.examDate||m.end||todayStr()
  }));

  state.records=(state.records||[]).map(r=>({
    id:r.id||uuid(),
    person:r.person||r.user||"尚子",
    subject:r.subject||"その他",
    minutes:Number(r.minutes||r.time||0),
    date:r.date||todayStr(),
    memo:r.memo||"",
    materialId:r.materialId||null,
    materialName:r.materialName||r.material||"時間だけ入力"
  }));

  save();
}

function showTab(id,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderAll();
}

function fillSelect(id,items){
  const el=document.getElementById(id);
  el.innerHTML="";
  items.forEach(item=>{
    const op=document.createElement("option");
    op.value=item;
    op.textContent=item;
    el.appendChild(op);
  });
}

function setupForms(){
  ["materialPerson","quickPerson"].forEach(id=>fillSelect(id,PEOPLE));
  ["materialSubject","quickSubject"].forEach(id=>fillSelect(id,SUBJECTS));
  ["materialStart","materialEnd","materialExam","materialRecordDate","quickDate"].forEach(id=>{
    document.getElementById(id).value=todayStr();
  });
}

function renderPersonFilter(area,key){
  const el=document.getElementById(area);
  const values=[["all","全員"],...PEOPLE.map(p=>[p,p])];
  el.innerHTML=values.map(([v,label])=>
    `<button class="${filters[key]===v?'active':''}" onclick="setFilter('${key}','${v}')">${label}</button>`
  ).join("");
}

function setFilter(key,value){
  filters[key]=value;
  renderAll();
}

function personOk(person,key){
  return filters[key]==="all" || person===filters[key];
}

function addMaterial(){
  const name=document.getElementById("materialName").value.trim();
  const total=Number(document.getElementById("materialTotal").value);
  if(!name){alert("教材名を入力してください");return;}
  if(!total){alert("総量を入力してください");return;}

  state.materials.push({
    id:uuid(),
    person:document.getElementById("materialPerson").value,
    subject:document.getElementById("materialSubject").value,
    name,
    total,
    unit:document.getElementById("materialUnit").value.trim(),
    start:document.getElementById("materialStart").value,
    end:document.getElementById("materialEnd").value,
    exam:document.getElementById("materialExam").value
  });

  document.getElementById("materialName").value="";
  document.getElementById("materialTotal").value="";
  document.getElementById("materialUnit").value="";
  save();
  renderAll();
}

function refreshMaterialSelect(){
  const el=document.getElementById("recordMaterial");
  el.innerHTML="";
  state.materials.forEach(m=>{
    const op=document.createElement("option");
    op.value=m.id;
    op.textContent=`${m.person}｜${m.subject}｜${m.name}`;
    el.appendChild(op);
  });
}

function addMaterialRecord(){
  const materialId=document.getElementById("recordMaterial").value;
  const m=state.materials.find(x=>x.id===materialId);
  const minutes=Number(document.getElementById("materialMinutes").value);
  if(!m){alert("教材を登録してください");return;}
  if(!minutes){alert("勉強時間を入力してください");return;}

  state.records.push({
    id:uuid(),
    person:m.person,
    subject:m.subject||"その他",
    minutes,
    date:document.getElementById("materialRecordDate").value,
    memo:document.getElementById("materialMemo").value,
    materialId:m.id,
    materialName:m.name
  });

  document.getElementById("materialMinutes").value="";
  document.getElementById("materialMemo").value="";
  save();
  renderAll();
}

function addQuickRecord(){
  const minutes=Number(document.getElementById("quickMinutes").value);
  if(!minutes){alert("勉強時間を入力してください");return;}

  state.records.push({
    id:uuid(),
    person:document.getElementById("quickPerson").value,
    subject:document.getElementById("quickSubject").value,
    minutes,
    date:document.getElementById("quickDate").value,
    memo:document.getElementById("quickMemo").value,
    materialId:null,
    materialName:"時間だけ入力"
  });

  document.getElementById("quickMinutes").value="";
  document.getElementById("quickMemo").value="";
  save();
  renderAll();
}

function sumMinutes(records){
  return records.reduce((a,r)=>a+Number(r.minutes||0),0);
}

function dateKey(d){
  return d.toISOString().slice(0,10);
}

function getPlansForDate(dateStr,key){
  const target=new Date(dateStr);
  const plans=[];
  state.materials.filter(m=>personOk(m.person,key)).forEach(m=>{
    const start=new Date(m.start);
    const end=new Date(m.end);
    if(target<start||target>end)return;

    const days=Math.max(1,Math.floor((end-start)/(1000*60*60*24))+1);
    const per=Math.ceil(m.total/days);
    const index=Math.floor((target-start)/(1000*60*60*24));
    const from=index*per+1;
    const to=Math.min(m.total,(index+1)*per);
    if(from<=m.total){
      plans.push({
        person:m.person,
        subject:m.subject,
        name:m.name,
        text:`${m.person}｜${m.subject} ${m.name} ${from}〜${to}${m.unit}`
      });
    }
  });
  return plans;
}

function renderToday(){
  const today=todayStr();
  const recs=state.records.filter(r=>r.date===today && personOk(r.person,"today"));
  const plans=getPlansForDate(today,"today");

  const todayMin=sumMinutes(recs);
  const completedPeople=[...new Set(recs.map(r=>r.person))].length;

  document.getElementById("todaySummary").innerHTML=`
    <div class="card">今日の実績<br><strong>${Math.round(todayMin/60*10)/10}h</strong></div>
    <div class="card">予定数<br><strong>${plans.length}</strong></div>
    <div class="card">記録した人<br><strong>${completedPeople}</strong></div>
  `;

  if(plans.length===0 && recs.length===0){
    document.getElementById("todayTasks").innerHTML="<p>今日の予定・実績はまだありません。</p>";
    return;
  }

  let html="";
  plans.forEach(p=>{
    html+=`<div class="task"><strong>予定</strong><br>${p.text}</div>`;
  });
  recs.forEach(r=>{
    html+=`<div class="task done"><strong>実績</strong><br>${r.person}｜${r.subject}｜${r.materialName}｜${r.minutes}分<br><span class="small">${r.memo||""}</span></div>`;
  });
  document.getElementById("todayTasks").innerHTML=html;
}

function renderMaterialList(){
  const list=state.materials.filter(m=>personOk(m.person,"materials"));
  if(list.length===0){
    document.getElementById("materialList").innerHTML="<p>教材はまだ登録されていません。</p>";
    return;
  }

  let html='<div class="table-wrap"><table><tr><th>名前</th><th>教科</th><th>教材</th><th>期間</th><th>試験日</th></tr>';
  list.forEach(m=>{
    html+=`<tr>
      <td>${m.person}</td>
      <td>${m.subject}</td>
      <td>${m.name}<br><span class="small">${m.total}${m.unit}</span></td>
      <td>${m.start}<br>〜${m.end}</td>
      <td>${m.exam}</td>
    </tr>`;
  });
  html+="</table></div>";
  document.getElementById("materialList").innerHTML=html;
}

function moveMonth(n){
  if(n===0)calendarDate=new Date();
  else calendarDate.setMonth(calendarDate.getMonth()+n);
  renderCalendar();
}

function renderCalendar(){
  const y=calendarDate.getFullYear();
  const m=calendarDate.getMonth();
  document.getElementById("calendarTitle").textContent=`${y}年${m+1}月`;

  const last=new Date(y,m+1,0);
  let html="";
  for(let i=1;i<=last.getDate();i++){
    const d=new Date(y,m,i);
    const key=dateKey(d);
    const plans=getPlansForDate(key,"calendar");
    const recs=state.records.filter(r=>r.date===key && personOk(r.person,"calendar"));
    const todayClass=key===todayStr()?"today":"";

    html+=`<div class="day ${todayClass}"><div class="day-num">${i}</div>`;
    plans.slice(0,3).forEach(p=>html+=`<div class="plan">${p.text}</div>`);
    recs.slice(0,3).forEach(r=>html+=`<div class="done-item">${r.person}｜${r.subject} ${r.minutes}分</div>`);
    if(plans.length>3||recs.length>3)html+=`<div class="small">他 ${plans.length+recs.length-3}件</div>`;
    html+="</div>";
  }
  document.getElementById("calendarGrid").innerHTML=html;
}

function inGraphRange(dateStr){
  if(graphRange==="all")return true;
  const d=new Date(dateStr);
  const now=new Date();
  const diff=(now-d)/(1000*60*60*24);
  if(graphRange==="week")return diff>=0 && diff<7;
  if(graphRange==="month")return diff>=0 && diff<31;
  if(graphRange==="year")return diff>=0 && diff<366;
  return true;
}

function setGraphRange(r){
  graphRange=r;
  renderGraph();
}

function renderBars(target,items){
  const max=Math.max(...items.map(x=>x.value),1);
  let html='<div class="table-wrap"><table>';
  items.forEach(x=>{
    const hour=Math.round(x.value/60*10)/10;
    const w=Math.round(x.value/max*100);
    html+=`<tr>
      <td style="width:90px">${x.label}</td>
      <td style="width:70px">${hour}h</td>
      <td><div class="bar-wrap"><div class="bar" style="width:${w}%">${hour}h</div></div></td>
    </tr>`;
  });
  html+="</table></div>";
  document.getElementById(target).innerHTML=html;
}

function renderGraph(){
  const recs=state.records.filter(r=>personOk(r.person,"graph") && inGraphRange(r.date));

  const subjectItems=SUBJECTS.map(s=>({
    label:s,
    value:sumMinutes(recs.filter(r=>(r.subject||"その他")===s))
  }));
  renderBars("subjectGraph",subjectItems);

  const personItems=PEOPLE.map(p=>({
    label:p,
    value:sumMinutes(recs.filter(r=>r.person===p))
  }));
  renderBars("personGraph",personItems);
}

function renderExam(){
  const today=new Date(todayStr());
  const list=state.materials.filter(m=>personOk(m.person,"exam"));

  if(list.length===0){
    document.getElementById("examList").innerHTML="<p>教材がまだありません。</p>";
    return;
  }

  let html='<div class="table-wrap"><table><tr><th>名前</th><th>教科</th><th>教材</th><th>試験まで</th><th>実績</th><th>状況</th></tr>';
  list.forEach(m=>{
    const exam=new Date(m.exam);
    const remain=Math.ceil((exam-today)/(1000*60*60*24));
    const recs=state.records.filter(r=>r.materialId===m.id);
    const done=sumMinutes(recs);
    const start=new Date(m.start);
    const end=new Date(m.end);
    const totalDays=Math.max(1,Math.floor((end-start)/(1000*60*60*24))+1);
    const passed=Math.max(0,Math.floor((today-start)/(1000*60*60*24))+1);
    const expectedRate=Math.min(100,Math.round(passed/totalDays*100));
    const actualRate=Math.min(100,Math.round(done/Math.max(m.total*10,1)*100));
    const status=actualRate+10<expectedRate?"遅れ気味":"順調";

    html+=`<tr>
      <td>${m.person}</td>
      <td>${m.subject}</td>
      <td>${m.name}</td>
      <td>${remain}日</td>
      <td>${Math.round(done/60*10)/10}h</td>
      <td>${status}<br><span class="small">達成率 ${actualRate}%</span></td>
    </tr>`;
  });
  html+="</table></div>";
  document.getElementById("examList").innerHTML=html;
}

function renderRecordList(){
  const list=[...state.records]
    .filter(r=>personOk(r.person,"manage"))
    .sort((a,b)=>new Date(b.date)-new Date(a.date));

  if(list.length===0){
    document.getElementById("recordList").innerHTML="<p>記録はまだありません。</p>";
    return;
  }

  let html='<div class="table-wrap"><table><tr><th>日付</th><th>名前</th><th>教科</th><th>教材</th><th>時間</th><th>メモ</th><th>削除</th></tr>';
  list.forEach(r=>{
    html+=`<tr>
      <td>${r.date}</td>
      <td>${r.person}</td>
      <td>${r.subject||"その他"}</td>
      <td>${r.materialName||"時間だけ入力"}</td>
      <td>${r.minutes}分</td>
      <td>${r.memo||""}</td>
      <td><button class="btn-red btn-small" onclick="deleteRecord('${r.id}')">削除</button></td>
    </tr>`;
  });
  html+="</table></div>";
  document.getElementById("recordList").innerHTML=html;
}

function deleteRecord(id){
  if(!confirm("この記録を削除しますか？"))return;
  state.records=state.records.filter(r=>r.id!==id);
  save();
  renderAll();
}

  document.getElementById("backupArea").value=JSON.stringify(state,null,2);
