<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Study Quest 7.2</title>
<style>
*{box-sizing:border-box}html,body{width:100%;overflow-x:hidden}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#0f172a,#1e1b4b);color:white;padding:12px;padding-bottom:90px}
h1{text-align:center;font-size:28px;margin:10px 0}.subtitle{text-align:center;color:#c7d2fe;margin-bottom:14px}
.box,.card{width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);padding:16px;margin-bottom:14px;border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;position:sticky;top:0;z-index:10;background:#0f172a;padding:8px 0}
.tabBtn{font-size:13px;padding:10px 2px;border-radius:14px;background:rgba(255,255,255,.16)}
.tabBtn.active{background:linear-gradient(135deg,#6366f1,#06b6d4)}
button,input,select{width:100%;border:none;border-radius:14px;padding:13px;font-size:16px;font-weight:800}
button{color:white;background:linear-gradient(135deg,#6366f1,#06b6d4)}
input,select{margin:7px 0;color:#111;background:white}
label{display:block;margin-top:12px;margin-bottom:3px;font-size:15px;font-weight:900;color:#dbeafe}
.hidden{display:none}.wide{width:100%;margin-top:9px}.danger{background:linear-gradient(135deg,#ef4444,#f97316)}.subbtn{background:rgba(255,255,255,.18)}
.name{font-size:22px;font-weight:900}.time{font-size:40px;font-weight:900;margin:10px 0;color:#a5f3fc}
.btns{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.btns button{font-size:14px;padding:12px 4px}
.btns3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.rankLine,.histLine{font-size:17px;font-weight:700;padding:7px 0}.small{color:#c7d2fe;font-size:13px;line-height:1.5}
#error,#appError{color:#fecaca;font-weight:800;margin-top:12px;white-space:pre-wrap}
.progressOuter{height:14px;background:rgba(255,255,255,.2);border-radius:999px;overflow:hidden;margin:10px 0}
.progressInner{height:100%;background:linear-gradient(90deg,#22d3ee,#a78bfa)}
.bigGoal{font-size:34px;font-weight:900;color:#fde68a;margin:8px 0}
.graph{display:flex;align-items:end;gap:6px;height:130px;margin-top:12px}
.bar{flex:1;background:linear-gradient(180deg,#22d3ee,#6366f1);border-radius:8px 8px 0 0;min-height:4px}
.graphLabel{display:flex;gap:6px}.graphLabel span{flex:1;text-align:center;font-size:11px;color:#c7d2fe}
.graphLabel{display:flex;gap:6px}.graphLabel span{flex:1;text-align:center;font-size:11px;color:#c7d2fe}

input[type="date"]{
  display:block;
  width:100%;
  max-width:100%;
  min-width:0;
  -webkit-appearance:none;
  appearance:none;
  height:64px;
  padding:13px;
  font-size:16px;
}

.box,
.card,
section,
#main{
  max-width:100%;
  overflow-x:hidden;
}

input,
select,
button{
  max-width:100%;
}


</style>
</head>
<body>

<h1>Study Quest 7.2</h1>
<div class="subtitle">今日やること・教材管理・勉強時間・ランキング</div>

<div id="login" class="box">
  <h2>ログイン</h2>
  <input id="email" type="email" placeholder="メールアドレス">
  <input id="password" type="password" placeholder="パスワード">
  <button class="wide" onclick="window.login()">ログイン</button>
  <div id="error"></div>
</div>

<div id="main" class="hidden">
  <div id="userInfo" class="subtitle"></div>
  <div id="todayTitle" class="subtitle"></div>
  <div id="appError"></div>

  <div class="tabs">
    <button class="tabBtn active" id="tab-today" onclick="window.showTab('today')">今日</button>
    <button class="tabBtn" id="tab-materials" onclick="window.showTab('materials')">教材</button>
    <button class="tabBtn" id="tab-time" onclick="window.showTab('time')">時間</button>
    <button class="tabBtn" id="tab-rank" onclick="window.showTab('rank')">競争</button>
  </div>

  <section id="view-today"></section>
  <section id="view-materials" class="hidden"></section>
  <section id="view-time" class="hidden"></section>
  <section id="view-rank" class="hidden"></section>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, collection, onSnapshot, increment, addDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={apiKey:"AIzaSyC9ucSVygIOhNsGvjj6mOlXbvtI2d1KnYw",authDomain:"studycount-wata.firebaseapp.com",projectId:"studycount-wata",storageBucket:"studycount-wata.firebasestorage.app",messagingSenderId:"497085827292",appId:"1:497085827292:web:f4085fd6190eb853150c19"};
const firebaseApp=initializeApp(firebaseConfig);
const db=getFirestore(firebaseApp);
const auth=getAuth(firebaseApp);

const allowedEmails=["wata20040229@gmail.com","wawawawayanakemi@gmail.com","ke.2009.mi.2013@gmail.com"];
const people=["みく","けいと","なおこ"];
const subjects=["国語","算数","数学","理科","社会","英語","その他"];

let todayData={みく:0,けいと:0,なおこ:0};
let totalData={みく:0,けいと:0,なおこ:0};
let dailyRecords=[],historyRecords=[],materials=[];
let unsubDaily=null,unsubHistory=null,unsubMaterials=null,currentUser=null;
let currentTab="today";
let selectedTodayPerson=localStorage.getItem("sq_todayPerson")||"みく";
let graphPerson=localStorage.getItem("sq_graphPerson")||"全員";
let graphRange=localStorage.getItem("sq_graphRange")||"week";

function todayKey(){
  const p=new Intl.DateTimeFormat("ja-JP",{timeZone:"Asia/Tokyo",year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(new Date());
  return `${p.find(x=>x.type==="year").value}-${p.find(x=>x.type==="month").value}-${p.find(x=>x.type==="day").value}`;
}
function nowText(){
  return new Intl.DateTimeFormat("ja-JP",{timeZone:"Asia/Tokyo",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"}).format(new Date());
}
function toDate(s){return new Date(s+"T00:00:00")}
function diffDays(a,b){return Math.floor((toDate(b)-toDate(a))/86400000)+1}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function showAppError(e){document.getElementById("appError").textContent="Firebaseエラー: "+(e.message||e)}
function jpDate(d){
  const p=new Intl.DateTimeFormat("ja-JP",{timeZone:"Asia/Tokyo",year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(d);
  return `${p.find(x=>x.type==="year").value}-${p.find(x=>x.type==="month").value}-${p.find(x=>x.type==="day").value}`;
}
function lastDays(n){
  const arr=[];
  for(let i=n-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);arr.push(jpDate(d));}
  return arr;
}

window.login=async function(){
  try{
    document.getElementById("error").textContent="";
    await signInWithEmailAndPassword(auth,document.getElementById("email").value.trim(),document.getElementById("password").value);
  }catch(e){document.getElementById("error").textContent=e.message}
};
window.logout=async function(){
  if(unsubDaily)unsubDaily();if(unsubHistory)unsubHistory();if(unsubMaterials)unsubMaterials();
  await signOut(auth);
};
await setPersistence(auth,browserLocalPersistence);

onAuthStateChanged(auth,user=>{
  if(!user){showLogin();return}
  if(!allowedEmails.includes(user.email)){
    showLogin("このアカウントは利用できません："+user.email);
    signOut(auth);return;
  }
  currentUser=user;showMain(user);startRealtime();
});

function showLogin(msg=""){
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("main").classList.add("hidden");
  document.getElementById("error").textContent=msg;
}
function showMain(user){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("main").classList.remove("hidden");
  document.getElementById("userInfo").textContent="ログイン中："+user.email;
  document.getElementById("todayTitle").textContent="今日："+todayKey();
}

window.showTab=function(tab){
  currentTab=tab;
  ["today","materials","time","rank"].forEach(t=>{
    document.getElementById("view-"+t).classList.toggle("hidden",t!==tab);
    document.getElementById("tab-"+t).classList.toggle("active",t===tab);
  });
  render();
};

window.add=async function(name,min){
  try{
    const date=todayKey();
    await setDoc(doc(db,"dailyStudy",`${date}_${name}`),{date,name,time:increment(min),updatedAtMs:Date.now()},{merge:true});
    await addDoc(collection(db,"studyHistory"),{date,datetime:nowText(),name,minutes:min,userEmail:currentUser.email,createdAtMs:Date.now()});
  }catch(e){showAppError(e)}
};

window.undoLast=async function(){
  try{
    if(!historyRecords.length){alert("取り消す履歴がありません");return}
    if(!confirm("最後の操作を取り消しますか？"))return;
    const h=historyRecords[0];
    const cur=dailyRecords.find(r=>r.date===h.date&&r.name===h.name);
    const newTime=Math.max(0,Number((cur&&cur.time)||0)-Number(h.minutes||0));
    await setDoc(doc(db,"dailyStudy",`${h.date}_${h.name}`),{date:h.date,name:h.name,time:newTime,updatedAtMs:Date.now()},{merge:true});
    await deleteDoc(doc(db,"studyHistory",h.id));
  }catch(e){showAppError(e)}
};

window.addMaterial=async function(){
  try{
    const person=document.getElementById("matPerson").value;
    const subject=document.getElementById("matSubject").value;
    const name=document.getElementById("matName").value.trim();
    const total=Number(document.getElementById("matTotal").value||0);
    const startDate=document.getElementById("matStart").value;
    const endDate=document.getElementById("matEnd").value;
    const testDate=document.getElementById("matExam").value;
    if(!name||!total||!startDate||!endDate||!testDate){alert("教材名・総量・開始日・最終日・試験日を入れてください");return}
    if(toDate(endDate)<toDate(startDate)){alert("勉強最終日は開始日以降にしてください");return}
    await addDoc(collection(db,"examMaterials"),{person,subject,name,total,done:0,startDate,endDate,testDate,createdAtMs:Date.now(),updatedAtMs:Date.now()});
    ["matName","matTotal","matStart","matEnd","matExam"].forEach(id=>document.getElementById(id).value="");
  }catch(e){showAppError(e)}
};

window.addProgress=async function(id,n){
  try{
    const m=materials.find(x=>x.id===id);if(!m)return;
    const done=Math.max(0,Math.min(Number(m.total||0),Number(m.done||0)+n));
    await setDoc(doc(db,"examMaterials",id),{done,updatedAtMs:Date.now()},{merge:true});
  }catch(e){showAppError(e)}
};

window.deleteMaterial=async function(id){
  if(!confirm("この教材を削除しますか？"))return;
  await deleteDoc(doc(db,"examMaterials",id));
};

function startRealtime(){
  if(unsubDaily)unsubDaily();if(unsubHistory)unsubHistory();if(unsubMaterials)unsubMaterials();

  unsubDaily=onSnapshot(collection(db,"dailyStudy"),snap=>{
    todayData={みく:0,けいと:0,なおこ:0};totalData={みく:0,けいと:0,なおこ:0};dailyRecords=[];
    const today=todayKey();
    snap.forEach(ds=>{
      const d=ds.data();if(!people.includes(d.name))return;
      const time=Number(d.time||0);
      dailyRecords.push({date:d.date,name:d.name,time});
      totalData[d.name]+=time;if(d.date===today)todayData[d.name]+=time;
    });
    dailyRecords.sort((a,b)=>a.date.localeCompare(b.date)||a.name.localeCompare(b.name));
    render();
  },showAppError);

  unsubHistory=onSnapshot(collection(db,"studyHistory"),snap=>{
    historyRecords=[];snap.forEach(ds=>historyRecords.push({id:ds.id,...ds.data()}));
    historyRecords.sort((a,b)=>Number(b.createdAtMs||0)-Number(a.createdAtMs||0));
    historyRecords=historyRecords.slice(0,30);
    render();
  },showAppError);

  unsubMaterials=onSnapshot(collection(db,"examMaterials"),snap=>{
    materials=[];snap.forEach(ds=>materials.push({id:ds.id,...ds.data()}));
    materials.sort((a,b)=>(a.person||"").localeCompare(b.person||"")||(a.endDate||"").localeCompare(b.endDate||""));
    render();
  },showAppError);
}

function calcTask(m){
  const today=todayKey(),total=Number(m.total||0),done=Number(m.done||0),remain=Math.max(0,total-done);
  if(remain<=0)return{status:"完了",quota:0,remain,days:0,pct:100};
  const pct=total?Math.round(done/total*100):0;
  if(today<m.startDate)return{status:"開始前",quota:0,remain,days:diffDays(m.startDate,m.endDate),pct};
  if(today>m.endDate)return{status:"期限超過",quota:remain,remain,days:0,pct};
  const days=Math.max(1,diffDays(today,m.endDate));
  return{status:"実行中",quota:Math.ceil(remain/days),remain,days,pct};
}

function render(){renderToday();renderMaterials();renderTime();renderRank();}

function renderToday(){
  const v=document.getElementById("view-today");
  let html=`<div class="box"><h2>🔥 今日やること</h2><label>人を選択</label><select id="todayPerson" onchange="window.changeTodayPerson(this.value)">`;
  people.forEach(p=>html+=`<option value="${p}" ${p===selectedTodayPerson?"selected":""}>${p}</option>`);
  html+=`</select><div id="todayTasks"></div></div>`;
  v.innerHTML=html;renderTodayOnly();
}
window.changeTodayPerson=function(v){selectedTodayPerson=v;localStorage.setItem("sq_todayPerson",v);renderTodayOnly();}
function renderTodayOnly(){
  const person=selectedTodayPerson;
  const list=materials.filter(m=>m.person===person).map(m=>({m,t:calcTask(m)})).filter(x=>x.t.status==="実行中"||x.t.status==="期限超過");
  const target=document.getElementById("todayTasks");if(!target)return;
  if(!list.length){target.innerHTML=`<div class="small">今日やる教材はありません</div>`;return}
  const totalQuota=list.reduce((s,x)=>s+x.t.quota,0);
  target.innerHTML=`<div class="bigGoal">今日 合計 ${totalQuota}</div>`+
    list.map(x=>`<div class="card"><div class="name">${esc(x.m.subject)}：${esc(x.m.name)}</div><div class="bigGoal">${x.t.quota}</div><div class="small">残り ${x.t.remain} / 勉強最終日 ${esc(x.m.endDate)} / ${x.t.status}</div><div class="progressOuter"><div class="progressInner" style="width:${x.t.pct}%"></div></div><div class="btns3"><button onclick="window.addProgress('${x.m.id}',1)">+1</button><button onclick="window.addProgress('${x.m.id}',5)">+5</button><button onclick="window.addProgress('${x.m.id}',10)">+10</button></div></div>`).join("");
}

function renderMaterials(){
  const v=document.getElementById("view-materials");
  let html=`<div class="box"><h2>📚 教材管理</h2>
<label>人を選択</label><select id="matPerson">${people.map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
<label>教科を選択</label><select id="matSubject">${subjects.map(s=>`<option value="${s}">${s}</option>`).join("")}</select>
<label>教材名</label><input id="matName" placeholder="例：漢字ドリル">
<label>総量（ページ・問）</label><input id="matTotal" type="number" placeholder="例：80">
<label>勉強開始日</label><input id="matStart" type="date">
<label>勉強最終日</label><input id="matEnd" type="date">
<label>試験日</label><input id="matExam" type="date">
<button class="wide" onclick="window.addMaterial()">教材を追加</button></div><div class="box"><h2>登録済み教材</h2>`;
  if(!materials.length)html+=`<div class="small">まだ教材がありません</div>`;
  materials.forEach(m=>{
    const t=calcTask(m);
    html+=`<div class="card"><div class="name">${esc(m.person)}：${esc(m.subject)}：${esc(m.name)}</div><div class="small">開始 ${esc(m.startDate)} / 最終 ${esc(m.endDate)} / 試験 ${esc(m.testDate)}</div><div class="progressOuter"><div class="progressInner" style="width:${t.pct}%"></div></div><div class="rankLine">${m.done||0} / ${m.total}（残り ${t.remain}）</div><div class="small">今日の目安：${t.quota} / ${t.status}</div><div class="btns"><button onclick="window.addProgress('${m.id}',1)">+1</button><button onclick="window.addProgress('${m.id}',5)">+5</button><button onclick="window.addProgress('${m.id}',10)">+10</button><button onclick="window.addProgress('${m.id}',-1)">-1</button><button onclick="window.deleteMaterial('${m.id}')">削除</button></div></div>`;
  });
  v.innerHTML=html+`</div>`;
}

function renderTime(){
  const v=document.getElementById("view-time");
  let html=`<div class="box"><h2>⏱ 勉強時間</h2>`;
  people.forEach(name=>{
    html+=`<div class="card"><div class="name">${name}</div><div class="time">${todayData[name]}分</div><div class="btns"><button onclick="window.add('${name}',5)">+5</button><button onclick="window.add('${name}',10)">+10</button><button onclick="window.add('${name}',15)">+15</button><button onclick="window.add('${name}',30)">+30</button><button onclick="window.add('${name}',60)">+60</button></div></div>`;
  });
  html+=`</div><div class="box"><button class="wide danger" onclick="window.undoLast()">最後の操作を取り消す</button><button class="wide subbtn" onclick="window.exportDailyCSV()">日別CSV</button><button class="wide subbtn" onclick="window.exportHistoryCSV()">履歴CSV</button><button class="wide subbtn" onclick="window.logout()">ログアウト</button></div><div class="box"><h2>📝 最近の履歴</h2>${historyRecords.length?historyRecords.map(h=>`<div class="histLine">${h.datetime||h.date}　${h.name}　+${h.minutes}分</div>`).join(""):`<div class="small">まだ履歴がありません</div>`}</div>`;
  v.innerHTML=html;
}

function renderRank(){
  const v=document.getElementById("view-rank");
  const todayRank=[...people].sort((a,b)=>todayData[b]-todayData[a]);
  const totalRank=[...people].sort((a,b)=>totalData[b]-totalData[a]);
  v.innerHTML=`<div class="box"><h2>🏆 今日ランキング</h2>${todayRank.map((n,i)=>`<div class="rankLine">${i+1}位 ${n}　${todayData[n]}分</div>`).join("")}</div>
<div class="box"><h2>🏅 累計ランキング</h2>${totalRank.map((n,i)=>`<div class="rankLine">${i+1}位 ${n}　${totalData[n]}分</div>`).join("")}</div>
${graphHtml()}`;
}

window.changeGraph=function(){
  graphPerson=document.getElementById("graphPerson").value;
  graphRange=document.getElementById("graphRange").value;
  localStorage.setItem("sq_graphPerson",graphPerson);
  localStorage.setItem("sq_graphRange",graphRange);
  renderRank();
}

function graphHtml(){
  const rows=buildGraphRows(graphPerson,graphRange);
  const max=Math.max(...rows.map(x=>x.value),1);
  const titlePerson=graphPerson==="全員"?"家族合計":graphPerson;
  const titleRange=graphRange==="week"?"1週間":graphRange==="month"?"1ヶ月":graphRange==="year"?"年間":"ALL";

  return `<div class="box"><h2>📈 勉強時間グラフ</h2>
<label>表示対象</label><select id="graphPerson" onchange="window.changeGraph()">
<option value="全員" ${graphPerson==="全員"?"selected":""}>全員</option>
${people.map(p=>`<option value="${p}" ${graphPerson===p?"selected":""}>${p}</option>`).join("")}
</select>
<label>期間</label><select id="graphRange" onchange="window.changeGraph()">
<option value="week" ${graphRange==="week"?"selected":""}>1週間</option>
<option value="month" ${graphRange==="month"?"selected":""}>1ヶ月</option>
<option value="year" ${graphRange==="year"?"selected":""}>年間</option>
<option value="all" ${graphRange==="all"?"selected":""}>ALL</option>
</select>
<div class="small">${titlePerson} / ${titleRange}</div>
<div class="graph">${rows.map(x=>`<div class="bar" style="height:${Math.max(4,x.value/max*120)}px" title="${x.label} ${x.value}分"></div>`).join("")}</div>
<div class="graphLabel">${rows.map(x=>`<span>${x.label}</span>`).join("")}</div>
<div class="small">単位：分</div></div>`;
}

function buildGraphRows(person,range){
  if(range==="week"){
    return lastDays(7).map(date=>({label:date.slice(5),value:sumMinutes(person,date,date)}));
  }
  if(range==="month"){
    return lastDays(30).map(date=>({label:date.slice(5),value:sumMinutes(person,date,date)}));
  }
  if(range==="year"){
    const y=todayKey().slice(0,4);
    const arr=[];
    for(let m=1;m<=12;m++){
      const mm=String(m).padStart(2,"0");
      arr.push({label:m+"月",value:sumMonth(person,`${y}-${mm}`)});
    }
    return arr;
  }
  const years=[...new Set(dailyRecords.map(r=>(r.date||"").slice(0,4)).filter(Boolean))].sort();
  if(!years.length)return [{label:"No data",value:0}];
  return years.map(y=>({label:y,value:sumYear(person,y)}));
}
function sumMinutes(person,start,end){
  return dailyRecords.filter(r=>r.date>=start&&r.date<=end&&(person==="全員"||r.name===person)).reduce((s,r)=>s+Number(r.time||0),0);
}
function sumMonth(person,ym){
  return dailyRecords.filter(r=>(r.date||"").startsWith(ym)&&(person==="全員"||r.name===person)).reduce((s,r)=>s+Number(r.time||0),0);
}
function sumYear(person,y){
  return dailyRecords.filter(r=>(r.date||"").startsWith(y)&&(person==="全員"||r.name===person)).reduce((s,r)=>s+Number(r.time||0),0);
}

window.exportDailyCSV=function(){
  let csv="日付,名前,勉強時間\n";dailyRecords.forEach(r=>csv+=`${r.date},${r.name},${r.time}\n`);downloadCSV(csv,`studyquest_daily_${todayKey()}.csv`);
};
window.exportHistoryCSV=async function(){
  const snap=await getDocs(collection(db,"studyHistory"));let rows=[];snap.forEach(d=>rows.push(d.data()));rows.sort((a,b)=>Number(a.createdAtMs||0)-Number(b.createdAtMs||0));
  let csv="日時,日付,名前,追加時間,入力者\n";rows.forEach(r=>csv+=`${r.datetime||""},${r.date||""},${r.name||""},${r.minutes||0},${r.userEmail||""}\n`);downloadCSV(csv,`studyquest_history_${todayKey()}.csv`);
};
function downloadCSV(csv,filename){
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}
</script>
