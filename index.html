<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Study Quest 5</title>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#0f172a,#1e1b4b);color:white;padding:18px}
h1{text-align:center;font-size:32px}
.subtitle{text-align:center;color:#c7d2fe;margin-bottom:18px}
.card,.loginBox,#ranking,#totalBox,#tools{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);padding:18px;margin-bottom:16px;border-radius:22px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.name{font-size:24px;font-weight:800}
.time{font-size:42px;font-weight:900;margin:12px 0;color:#a5f3fc}
.btns{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
button,input{border:none;border-radius:16px;padding:14px;font-size:16px;font-weight:800}
button{color:white;background:linear-gradient(135deg,#6366f1,#06b6d4)}
input{width:100%;box-sizing:border-box;margin:8px 0}
.logoutBtn,.exportBtn{width:100%;margin-top:10px;background:rgba(255,255,255,.18)}
.rankLine{font-size:20px;font-weight:700;padding:8px 0}
.hidden{display:none}
#error{color:#fecaca;font-weight:800;margin-top:12px}
.small{color:#c7d2fe;font-size:14px}
</style>
</head>

<body>

<h1>Study Quest 5</h1>
<div class="subtitle">日別保存・家族リアルタイム勉強ランキング</div>

<div id="login" class="loginBox">
  <h2>ログインしてください</h2>
  <input id="email" type="email" placeholder="メールアドレス">
  <input id="password" type="password" placeholder="パスワード">
  <button onclick="window.login()">ログイン</button>
  <div id="error"></div>
</div>

<div id="main" class="hidden">
  <div id="userInfo" class="subtitle"></div>
  <div id="todayTitle" class="subtitle"></div>
  <div id="app"></div>
  <div id="ranking"></div>
  <div id="totalBox"></div>
  <div id="tools">
    <button class="exportBtn" onclick="window.exportCSV()">CSVエクスポート</button>
    <button class="logoutBtn" onclick="window.logout()">ログアウト</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, collection, onSnapshot, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC9ucSVygIOhNsGvjj6mOlXbvtI2d1KnYw",
  authDomain: "studycount-wata.firebaseapp.com",
  projectId: "studycount-wata",
  storageBucket: "studycount-wata.firebasestorage.app",
  messagingSenderId: "497085827292",
  appId: "1:497085827292:web:f4085fd6190eb853150c19"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
const auth = getAuth(firebaseApp);

const allowedEmails = [
  "wata20040229@gmail.com",
  "wawawawayanakemi@gmail.com",
  "ke.2009.mi.2013@gmail.com"
];

const people = ["みく","けいと","なおこ"];
let todayData = {みく:0,けいと:0,なおこ:0};
let totalData = {みく:0,けいと:0,なおこ:0};
let allRecords = [];
let unsubscribe = null;

function todayKey(){
  const parts = new Intl.DateTimeFormat("ja-JP",{
    timeZone:"Asia/Tokyo",
    year:"numeric",month:"2-digit",day:"2-digit"
  }).formatToParts(new Date());
  const y = parts.find(p=>p.type==="year").value;
  const m = parts.find(p=>p.type==="month").value;
  const d = parts.find(p=>p.type==="day").value;
  return `${y}-${m}-${d}`;
}

window.login = async function(){
  try{
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    await signInWithEmailAndPassword(auth,email,password);
  }catch(e){
    document.getElementById("error").textContent = e.message;
  }
};

window.logout = async function(){
  if(unsubscribe) unsubscribe();
  await signOut(auth);
};

onAuthStateChanged(auth,user=>{
  if(!user){ showLogin(); return; }

  if(!allowedEmails.includes(user.email)){
    showLogin("このアカウントは利用できません：" + user.email);
    signOut(auth);
    return;
  }

  showMain(user);
  startRealtime();
});

function showLogin(msg=""){
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("main").classList.add("hidden");
  document.getElementById("error").textContent = msg;
}

function showMain(user){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("main").classList.remove("hidden");
  document.getElementById("userInfo").textContent = "ログイン中：" + user.email;
  document.getElementById("todayTitle").textContent = "今日：" + todayKey();
}

function render(){
  const appDiv = document.getElementById("app");
  appDiv.innerHTML = "";

  people.forEach(name=>{
    appDiv.innerHTML += `
      <div class="card">
        <div class="name">${name}</div>
        <div class="time">${todayData[name]}分</div>
        <div class="btns">
          <button onclick="window.add('${name}',5)">+5</button>
          <button onclick="window.add('${name}',10)">+10</button>
          <button onclick="window.add('${name}',15)">+15</button>
          <button onclick="window.add('${name}',30)">+30</button>
          <button onclick="window.add('${name}',60)">+60</button>
        </div>
      </div>
    `;
  });

  const todayRank = [...people].sort((a,b)=>todayData[b]-todayData[a]);
  document.getElementById("ranking").innerHTML =
    "<h2>🏆 今日のランキング</h2>" +
    todayRank.map((n,i)=>`<div class="rankLine">${i+1}位 ${n}　${todayData[n]}分</div>`).join("");

  const totalRank = [...people].sort((a,b)=>totalData[b]-totalData[a]);
  document.getElementById("totalBox").innerHTML =
    "<h2>🏅 累計ランキング</h2>" +
    totalRank.map((n,i)=>`<div class="rankLine">${i+1}位 ${n}　${totalData[n]}分</div>`).join("");
}

async function add(name,min){
  const date = todayKey();
  const id = `${date}_${name}`;
  await setDoc(doc(db,"dailyStudy",id),{
    date:date,
    name:name,
    time:increment(min),
    updatedAt:serverTimestamp()
  },{merge:true});
}

function startRealtime(){
  if(unsubscribe) unsubscribe();

  unsubscribe = onSnapshot(collection(db,"dailyStudy"),snap=>{
    todayData = {みく:0,けいと:0,なおこ:0};
    totalData = {みく:0,けいと:0,なおこ:0};
    allRecords = [];
    const today = todayKey();

    snap.forEach(docSnap=>{
      const d = docSnap.data();
      if(!d.name || !people.includes(d.name)) return;
      const time = Number(d.time || 0);
      const date = d.date || "";

      allRecords.push({date:date,name:d.name,time:time});

      totalData[d.name] += time;
      if(date === today){
        todayData[d.name] += time;
      }
    });

    allRecords.sort((a,b)=>a.date.localeCompare(b.date) || a.name.localeCompare(b.name));
    render();
  });
}

window.add = add;

window.exportCSV = function(){
  let csv = "日付,名前,勉強時間\n";
  allRecords.forEach(r=>{
    csv += `${r.date},${r.name},${r.time}\n`;
  });

  const blob = new Blob(["\uFEFF" + csv],{type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `studyquest_${todayKey()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
};
</script>

</body>
</html>
