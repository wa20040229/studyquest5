<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Study Quest 5</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,#0f172a,#1e1b4b);
  color:white;
  padding:18px;
}
h1{text-align:center;font-size:32px;}
.subtitle{text-align:center;color:#c7d2fe;margin-bottom:18px;}
.card,.loginBox,#ranking{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.18);
  padding:18px;
  margin-bottom:16px;
  border-radius:22px;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
}
.name{font-size:24px;font-weight:800;}
.time{font-size:42px;font-weight:900;margin:12px 0;color:#a5f3fc;}
.btns{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
button{
  border:none;border-radius:16px;padding:14px 0;
  font-size:16px;font-weight:800;color:white;
  background:linear-gradient(135deg,#6366f1,#06b6d4);
}
.loginBtn,.logoutBtn{width:100%;margin-top:12px;}
.logoutBtn{background:rgba(255,255,255,.18);}
.rankLine{font-size:20px;font-weight:700;padding:8px 0;}
.hidden{display:none;}
#error{color:#fecaca;font-weight:800;margin-top:12px;}
</style>
</head>

<body>

<h1>Study Quest 5</h1>
<div class="subtitle">家族リアルタイム勉強ランキング</div>

<div id="login" class="loginBox">
  <h2>ログインしてください</h2>
  <p>家族3人だけが使えます。</p>
  <button class="loginBtn" onclick="window.login()">Googleでログイン</button>
  <div id="error"></div>
</div>

<div id="main" class="hidden">
  <div id="userInfo" class="subtitle"></div>
  <div id="app"></div>
  <div id="ranking"></div>
  <button class="logoutBtn" onclick="window.logout()">ログアウト</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC9ucSVygIOhNsGvjj6mOlXbvtI2d1KnYw",
  authDomain: "studycount-wata.firebaseapp.com",
  projectId: "studycount-wata",
  storageBucket: "studycount-wata.firebasestorage.app",
  messagingSenderId: "497085827292",
  appId: "1:497085827292:web:f4085fd6190eb853150c19"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
const auth = getAuth(firebaseApp);
const provider = new GoogleAuthProvider();

const allowedEmails = [
  "wata20040229@gmail.com",
  "wawawawayanakemi@gmail.com",
  "ke.2009.mi.2013@gmail.com"
];

const people = ["みく","けいと","なおこ"];
let data = {みく:0, けいと:0, なおこ:0};
let unsubscribe = null;

window.login = async function(){
  try{
    await signInWithPopup(auth, provider);
  }catch(e){
    document.getElementById("error").textContent = e.message;
  }
};

window.logout = async function(){
  if(unsubscribe) unsubscribe();
  await signOut(auth);
};

onAuthStateChanged(auth, user=>{
  if(!user){
    showLogin();
    return;
  }

  if(!allowedEmails.includes(user.email)){
    showLogin("このGoogleアカウントは利用できません：" + user.email);
    signOut(auth);
    return;
  }

  showMain(user);
  startRealtime();
});

function showLogin(msg=""){
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("main").classList.add("hidden");
  document.getElementById("error").textContent = msg;
}

function showMain(user){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("main").classList.remove("hidden");
  document.getElementById("userInfo").textContent = "ログイン中：" + user.email;
}

function render(){
  const appDiv = document.getElementById("app");
  appDiv.innerHTML = "";

  people.forEach(name=>{
    appDiv.innerHTML += `
      <div class="card">
        <div class="name">${name}</div>
        <div class="time">${data[name]}分</div>
        <div class="btns">
          <button onclick="window.add('${name}',5)">+5</button>
          <button onclick="window.add('${name}',10)">+10</button>
          <button onclick="window.add('${name}',15)">+15</button>
          <button onclick="window.add('${name}',30)">+30</button>
          <button onclick="window.add('${name}',60)">+60</button>
        </div>
      </div>
    `;
  });

  const rank = [...people].sort((a,b)=>data[b]-data[a]);

  document.getElementById("ranking").innerHTML =
    "<h2>🏆 ランキング</h2>" +
    rank.map((n,i)=>`<div class="rankLine">${i+1}位 ${n}　${data[n]}分</div>`).join("");
}

async function add(name,min){
  data[name] += min;
  await setDoc(doc(db,"study",name),{ time:data[name] });
}

function startRealtime(){
  if(unsubscribe) unsubscribe();

  unsubscribe = onSnapshot(collection(db,"study"), snap=>{
    snap.docChanges().forEach(change=>{
      const d = change.doc.data();
      data[change.doc.id] = d.time || 0;
    });
    render();
  });
}

window.add = add;
</script>

</body>
</html>
