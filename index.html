<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Study Quest 5</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,#0f172a,#1e1b4b);
  color:white;
  padding:18px;
}

h1{
  margin:8px 0 18px;
  text-align:center;
  font-size:32px;
}

.subtitle{
  text-align:center;
  color:#c7d2fe;
  margin-bottom:18px;
}

.card{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.18);
  padding:18px;
  margin-bottom:16px;
  border-radius:22px;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
}

.name{
  font-size:24px;
  font-weight:800;
}

.time{
  font-size:42px;
  font-weight:900;
  margin:12px 0;
  color:#a5f3fc;
}

.btns{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

button{
  border:none;
  border-radius:16px;
  padding:14px 0;
  font-size:18px;
  font-weight:800;
  color:white;
  background:linear-gradient(135deg,#6366f1,#06b6d4);
}

button:active{
  transform:scale(.96);
}

#ranking{
  background:rgba(255,255,255,0.14);
  padding:18px;
  border-radius:22px;
  margin-top:22px;
}

#ranking h2{
  margin-top:0;
}

.rankLine{
  font-size:20px;
  font-weight:700;
  padding:8px 0;
}
</style>
</head>

<body>

<h1>Study Quest 5</h1>
<div class="subtitle">家族リアルタイム勉強ランキング</div>

<div id="app"></div>
<div id="ranking"></div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
  getFirestore, 
  doc, 
  setDoc, 
  collection, 
  onSnapshot 
} 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC9ucSVygIOhNsGvjj6mOlXbvtI2d1KnYw",
  authDomain: "studycount-wata.firebaseapp.com",
  projectId: "studycount-wata",
  storageBucket: "studycount-wata.firebasestorage.app",
  messagingSenderId: "497085827292",
  appId: "1:497085827292:web:f4085fd6190eb853150c19"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const people = ["みく","けいと","なおこ"];
let data = {みく:0, けいと:0, なおこ:0};

function render(){

  const appDiv = document.getElementById("app");
  appDiv.innerHTML = "";

  people.forEach(name=>{
    appDiv.innerHTML += `
      <div class="card">
        <div class="name">${name}</div>
        <div class="time">${data[name]}分</div>
        <div class="btns">
          <button onclick="window.add('${name}',10)">+10</button>
          <button onclick="window.add('${name}',30)">+30</button>
          <button onclick="window.add('${name}',60)">+60</button>
        </div>
      </div>
    `;
  });

  const rank = [...people].sort((a,b)=>data[b]-data[a]);

  document.getElementById("ranking").innerHTML =
    "<h2>🏆 ランキング</h2>" +
    rank.map((n,i)=>
      `<div class="rankLine">${i+1}位 ${n}　${data[n]}分</div>`
    ).join("");
}

async function add(name,min){
  data[name] += min;
  await setDoc(doc(db,"study",name),{
    time:data[name]
  });
}

function startRealtime(){
  onSnapshot(collection(db,"study"),(snap)=>{
    snap.docChanges().forEach(change=>{
      const d = change.doc.data();
      data[change.doc.id] = d.time || 0;
    });
    render();
  });
}

window.add = add;
startRealtime();

</script>

</body>
</html>
