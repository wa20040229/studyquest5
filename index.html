```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyQuest Ver8.0</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#f5f7fb;
  color:#222;
}
header{
  background:linear-gradient(135deg,#5b7cfa,#8b5cf6);
  color:white;
  padding:20px;
  text-align:center;
}
header h1{margin:0;font-size:28px}
header p{margin:6px 0 0}
.container{
  max-width:1100px;
  margin:auto;
  padding:16px;
}
.box{
  background:white;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  overflow:hidden;
}
h2{margin-top:0;font-size:20px}
label{
  display:block;
  font-weight:bold;
  margin-top:10px;
}
input,select,textarea,button{
  width:100%;
  max-width:100%;
  min-width:0;
  padding:12px;
  margin-top:6px;
  border:1px solid #d5d8e2;
  border-radius:10px;
  font-size:16px;
}
input[type="date"]{
  display:block;
  width:100%;
  max-width:100%;
  min-width:0;
  -webkit-appearance:none;
  appearance:none;
  height:48px;
  overflow:hidden;
}
button{
  background:#5b7cfa;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
button:hover{opacity:.9}
.btn-red{background:#ef4444}
.btn-green{background:#22c55e}
.btn-gray{background:#64748b}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}
.stat{
  background:#eef2ff;
  border-radius:14px;
  padding:14px;
}
.stat strong{font-size:24px}
.tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:12px;
}
.tabs button{
  width:auto;
  padding:10px 14px;
}
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}
.day{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:10px;
  min-height:110px;
  padding:6px;
  font-size:12px;
  overflow:hidden;
}
.day.today{border:3px solid #5b7cfa}
.day-num{font-weight:bold;margin-bottom:4px}
.plan{background:#dbeafe;padding:3px;border-radius:5px;margin:2px 0}
.done{background:#dcfce7;padding:3px;border-radius:5px;margin:2px 0}
.warn{background:#fef3c7}
.danger{background:#fee2e2}
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th,td{
  border-bottom:1px solid #e5e7eb;
  padding:8px;
  text-align:left;
}
.bar-wrap{
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
  height:22px;
}
.bar{
  background:#5b7cfa;
  height:22px;
  color:white;
  font-size:12px;
  text-align:right;
  padding-right:6px;
}
.small{font-size:12px;color:#666}
@media(max-width:600px){
  header h1{font-size:22px}
  .container{padding:10px}
  .calendar{grid-template-columns:repeat(2,1fr)}
  table{font-size:12px}
  th,td{padding:6px}
}
</style>
</head>
<body>

<header>
  <h1>StudyQuest Ver8.0</h1>
  <p>勉強記録・教科別分析・予定カレンダー</p>
</header>

<div class="container">

<div class="box">
  <h2>ダッシュボード</h2>
  <div class="grid" id="dashboard"></div>
</div>

<div class="box">
  <h2>時間だけ入力</h2>
  <label>勉強者</label>
  <select id="quickPerson"></select>

  <label>教科</label>
  <select id="quickSubject"></select>

  <label>勉強時間（分）</label>
  <input type="number" id="quickMinutes" min="1">

  <label>日付</label>
  <input type="date" id="quickDate">

  <label>メモ</label>
  <textarea id="quickMemo" rows="2"></textarea>

  <button onclick="addQuickRecord()">記録する</button>
</div>

<div class="box">
  <h2>教材登録</h2>
  <label>勉強者</label>
  <select id="materialPerson"></select>

  <label>教科</label>
  <select id="materialSubject"></select>

  <label>教材名</label>
  <input id="materialName" placeholder="例：数学ワーク">

  <label>総量</label>
  <input type="number" id="materialTotal" min="1" placeholder="例：120">

  <label>単位</label>
  <input id="materialUnit" placeholder="例：ページ、問、単語">

  <label>開始日</label>
  <input type="date" id="materialStart">

  <label>終了日</label>
  <input type="date" id="materialEnd">

  <label>試験日</label>
  <input type="date" id="materialExam">

  <button onclick="addMaterial()">教材を登録</button>
</div>

<div class="box">
  <h2>教材から勉強記録</h2>
  <label>教材</label>
  <select id="recordMaterial"></select>

  <label>勉強時間（分）</label>
  <input type="number" id="materialMinutes" min="1">

  <label>日付</label>
  <input type="date" id="materialRecordDate">

  <label>メモ</label>
  <textarea id="materialMemo" rows="2"></textarea>

  <button onclick="addMaterialRecord()">教材で記録する</button>
</div>

<div class="box">
  <h2>教科別集計・グラフ</h2>
  <div class="tabs">
    <button onclick="setRange('week')">1週間</button>
    <button onclick="setRange('month')">1ヶ月</button>
    <button onclick="setRange('year')">年間</button>
    <button onclick="setRange('all')">All</button>
  </div>

  <label>表示する人</label>
  <select id="filterPerson" onchange="renderAll()">
    <option value="all">全員</option>
  </select>

  <div id="subjectGraph"></div>
</div>

<div class="box">
  <h2>予定カレンダー</h2>
  <div class="tabs">
    <button onclick="moveMonth(-1)">前月</button>
    <button onclick="moveMonth(0)">今月</button>
    <button onclick="moveMonth(1)">次月</button>
  </div>
  <h3 id="calendarTitle"></h3>
  <div class="calendar" id="calendar"></div>
</div>

<div class="box">
  <h2>試験モード</h2>
  <div id="examMode"></div>
</div>

<div class="box">
  <h2>記録一覧・選んで削除</h2>
  <div id="recordList"></div>
</div>

<div class="box">
  <h2>データ管理</h2>
  <button class="btn-gray" onclick="exportData()">バックアップを表示</button>
  <textarea id="backupArea" rows="6" placeholder="ここにバックアップが表示されます"></textarea>
</div>

</div>

<script>
const SUBJECTS=["国語","数学","英語","理科","社会","その他"];
const PEOPLE=["息子","娘","自分"];
const STORAGE_KEY="studyquest_v8_data";

let state={
  records:[],
  materials:[]
};

let currentRange="week";
let calendarDate=new Date();

function todayStr(){
  const d=new Date();
  return d.toISOString().slice(0,10);
}

function load(){
  const saved=localStorage.getItem(STORAGE_KEY);
  if(saved){
    state=JSON.parse(saved);
  }else{
    state.records=[];
    state.materials=[];
  }

  state.records=(state.records||[]).map(r=>({
    id:r.id||crypto.randomUUID(),
    person:r.person||"自分",
    subject:r.subject||"その他",
    minutes:Number(r.minutes||0),
    date:r.date||todayStr(),
    memo:r.memo||"",
    materialId:r.materialId||null,
    materialName:r.materialName||"時間だけ入力"
  }));

  state.materials=(state.materials||[]).map(m=>({
    id:m.id||crypto.randomUUID(),
    person:m.person||"自分",
    subject:m.subject||"その他",
    name:m.name||"教材",
    total:Number(m.total||0),
    unit:m.unit||"",
    start:m.start||todayStr(),
    end:m.end||m.exam||todayStr(),
    exam:m.exam||m.end||todayStr()
  }));

  save();
}

function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}

function fillSelect(id,items){
  const el=document.getElementById(id);
  el.innerHTML="";
  items.forEach(x=>{
    const op=document.createElement("option");
    op.value=x;
    op.textContent=x;
    el.appendChild(op);
  });
}

function initForms(){
  ["quickPerson","materialPerson"].forEach(id=>fillSelect(id,PEOPLE));
  ["quickSubject","materialSubject"].forEach(id=>fillSelect(id,SUBJECTS));

  document.getElementById("quickDate").value=todayStr();
  document.getElementById("materialRecordDate").value=todayStr();
  document.getElementById("materialStart").value=todayStr();
  document.getElementById("materialEnd").value=todayStr();
  document.getElementById("materialExam").value=todayStr();
}

function refreshMaterialSelect(){
  const el=document.getElementById("recordMaterial");
  el.innerHTML="";
  state.materials.forEach(m=>{
    const op=document.createElement("option");
    op.value=m.id;
    op.textContent=`${m.person}｜${m.subject}｜${m.name}`;
    el.appendChild(op);
  });
}

function refreshPersonFilter(){
  const el=document.getElementById("filterPerson");
  const old=el.value||"all";
  el.innerHTML='<option value="all">全員</option>';
  PEOPLE.forEach(p=>{
    const op=document.createElement("option");
    op.value=p;
    op.textContent=p;
    el.appendChild(op);
  });
  el.value=old;
}

function addQuickRecord(){
  const minutes=Number(document.getElementById("quickMinutes").value);
  if(!minutes){alert("勉強時間を入力してください");return;}

  state.records.push({
    id:crypto.randomUUID(),
    person:document.getElementById("quickPerson").value,
    subject:document.getElementById("quickSubject").value,
    minutes,
    date:document.getElementById("quickDate").value,
    memo:document.getElementById("quickMemo").value,
    materialId:null,
    materialName:"時間だけ入力"
  });

  document.getElementById("quickMinutes").value="";
  document.getElementById("quickMemo").value="";
  save();
  renderAll();
}

function addMaterial(){
  const name=document.getElementById("materialName").value.trim();
  const total=Number(document.getElementById("materialTotal").value);
  if(!name || !total){alert("教材名と総量を入力してください");return;}

  state.materials.push({
    id:crypto.randomUUID(),
    person:document.getElementById("materialPerson").value,
    subject:document.getElementById("materialSubject").value,
    name,
    total,
    unit:document.getElementById("materialUnit").value.trim(),
    start:document.getElementById("materialStart").value,
    end:document.getElementById("materialEnd").value,
    exam:document.getElementById("materialExam").value
  });

  document.getElementById("materialName").value="";
  document.getElementById("materialTotal").value="";
  document.getElementById("materialUnit").value="";
  save();
  renderAll();
}

function addMaterialRecord(){
  const id=document.getElementById("recordMaterial").value;
  const m=state.materials.find(x=>x.id===id);
  const minutes=Number(document.getElementById("materialMinutes").value);
  if(!m){alert("教材を登録してください");return;}
  if(!minutes){alert("勉強時間を入力してください");return;}

  state.records.push({
    id:crypto.randomUUID(),
    person:m.person,
    subject:m.subject||"その他",
    minutes,
    date:document.getElementById("materialRecordDate").value,
    memo:document.getElementById("materialMemo").value,
    materialId:m.id,
    materialName:m.name
  });

  document.getElementById("materialMinutes").value="";
  document.getElementById("materialMemo").value="";
  save();
  renderAll();
}

function inRange(dateStr){
  if(currentRange==="all")return true;
  const d=new Date(dateStr);
  const now=new Date();
  const diff=(now-d)/(1000*60*60*24);
  if(currentRange==="week")return diff>=0 && diff<7;
  if(currentRange==="month")return diff>=0 && diff<31;
  if(currentRange==="year")return diff>=0 && diff<366;
  return true;
}

function filteredRecords(){
  const person=document.getElementById("filterPerson")?.value||"all";
  return state.records.filter(r=>{
    const okPerson=person==="all"||r.person===person;
    return okPerson && inRange(r.date);
  });
}

function sumMinutes(records){
  return records.reduce((a,b)=>a+Number(b.minutes||0),0);
}

function renderDashboard(){
  const today=todayStr();
  const todayMin=sumMinutes(state.records.filter(r=>r.date===today));
  const weekMin=sumMinutes(state.records.filter(r=>{
    const diff=(new Date()-new Date(r.date))/(1000*60*60*24);
    return diff>=0&&diff<7;
  }));
  const monthMin=sumMinutes(state.records.filter(r=>{
    const diff=(new Date()-new Date(r.date))/(1000*60*60*24);
    return diff>=0&&diff<31;
  }));

  const nextExam=state.materials
    .filter(m=>new Date(m.exam)>=new Date(today))
    .sort((a,b)=>new Date(a.exam)-new Date(b.exam))[0];

  const remain=nextExam?Math.ceil((new Date(nextExam.exam)-new Date(today))/(1000*60*60*24)):"-";

  document.getElementById("dashboard").innerHTML=`
    <div class="stat">今日<br><strong>${Math.round(todayMin/60*10)/10}h</strong></div>
    <div class="stat">今週<br><strong>${Math.round(weekMin/60*10)/10}h</strong></div>
    <div class="stat">今月<br><strong>${Math.round(monthMin/60*10)/10}h</strong></div>
    <div class="stat">次の試験まで<br><strong>${remain}</strong>日</div>
  `;
}

function renderSubjectGraph(){
  const records=filteredRecords();
  const totals={};
  SUBJECTS.forEach(s=>totals[s]=0);
  records.forEach(r=>totals[r.subject||"その他"]+=Number(r.minutes||0));
  const max=Math.max(...Object.values(totals),1);

  let html="<table><tr><th>教科</th><th>時間</th><th>グラフ</th></tr>";
  SUBJECTS.forEach(s=>{
    const h=Math.round(totals[s]/60*10)/10;
    const w=Math.round(totals[s]/max*100);
    html+=`
      <tr>
        <td>${s}</td>
        <td>${h}h</td>
        <td><div class="bar-wrap"><div class="bar" style="width:${w}%">${h}h</div></div></td>
      </tr>
    `;
  });
  html+="</table>";
  document.getElementById("subjectGraph").innerHTML=html;
}

function setRange(r){
  currentRange=r;
  renderAll();
}

function dateKey(d){
  return d.toISOString().slice(0,10);
}

function getPlansForDate(dateStr){
  const plans=[];
  state.materials.forEach(m=>{
    const start=new Date(m.start);
    const end=new Date(m.end);
    const target=new Date(dateStr);
    if(target<start||target>end)return;

    const days=Math.max(1,Math.ceil((end-start)/(1000*60*60*24))+1);
    const per=Math.ceil(m.total/days);
    const dayIndex=Math.floor((target-start)/(1000*60*60*24));
    const from=dayIndex*per+1;
    const to=Math.min(m.total,(dayIndex+1)*per);
    if(from<=m.total){
      plans.push(`${m.subject} ${m.name} ${from}〜${to}${m.unit}`);
    }
  });
  return plans;
}

function renderCalendar(){
  const y=calendarDate.getFullYear();
  const m=calendarDate.getMonth();
  document.getElementById("calendarTitle").textContent=`${y}年${m+1}月`;

  const first=new Date(y,m,1);
  const last=new Date(y,m+1,0);
  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  for(let i=1;i<=last.getDate();i++){
    const d=new Date(y,m,i);
    const key=dateKey(d);
    const recs=state.records.filter(r=>r.date===key);
    const plans=getPlansForDate(key);
    const doneMin=sumMinutes(recs);
    const todayClass=key===todayStr()?"today":"";

    let html=`<div class="day ${todayClass}">
      <div class="day-num">${i}</div>`;

    plans.slice(0,3).forEach(p=>html+=`<div class="plan">予定：${p}</div>`);
    recs.slice(0,3).forEach(r=>html+=`<div class="done">実績：${r.subject} ${r.minutes}分</div>`);
    if(doneMin>0)html+=`<div class="small">合計 ${doneMin}分</div>`;
    html+="</div>";
    cal.innerHTML+=html;
  }
}

function moveMonth(n){
  if(n===0)calendarDate=new Date();
  else calendarDate.setMonth(calendarDate.getMonth()+n);
  renderCalendar();
}

function renderExamMode(){
  const today=new Date(todayStr());
  let html="<table><tr><th>教材</th><th>教科</th><th>試験まで</th><th>実績</th><th>状況</th></tr>";

  state.materials.forEach(m=>{
    const exam=new Date(m.exam);
    const remain=Math.ceil((exam-today)/(1000*60*60*24));
    const recs=state.records.filter(r=>r.materialId===m.id);
    const done=sumMinutes(recs);
    const totalTarget=m.total*10;
    const rate=Math.min(100,Math.round(done/Math.max(totalTarget,1)*100));
    let status="順調";
    if(rate<40)status="遅れ気味";
    if(rate<20)status="危険";

    html+=`
      <tr>
        <td>${m.name}</td>
        <td>${m.subject}</td>
        <td>${remain}日</td>
        <td>${Math.round(done/60*10)/10}h</td>
        <td>${status} ${rate}%</td>
      </tr>
    `;
  });

  html+="</table>";
  document.getElementById("examMode").innerHTML=html;
}

function renderRecordList(){
  const sorted=[...state.records].sort((a,b)=>new Date(b.date)-new Date(a.date));
  let html="<table><tr><th>日付</th><th>人</th><th>教科</th><th>教材</th><th>時間</th><th>メモ</th><th>削除</th></tr>";
  sorted.forEach(r=>{
    html+=`
      <tr>
        <td>${r.date}</td>
        <td>${r.person}</td>
        <td>${r.subject||"その他"}</td>
        <td>${r.materialName||"時間だけ入力"}</td>
        <td>${r.minutes}分</td>
        <td>${r.memo||""}</td>
        <td><button class="btn-red" onclick="deleteRecord('${r.id}')">削除</button></td>
      </tr>
    `;
  });
  html+="</table>";
  document.getElementById("recordList").innerHTML=html;
}

function deleteRecord(id){
  if(!confirm("この記録を削除しますか？"))return;
  state.records=state.records.filter(r=>r.id!==id);
  save();
  renderAll();
}

function exportData(){
  document.getElementById("backupArea").value=JSON.stringify(state,null,2);
}

function renderAll(){
  refreshMaterialSelect();
  refreshPersonFilter();
  renderDashboard();
  renderSubjectGraph();
  renderCalendar();
  renderExamMode();
  renderRecordList();
}

load();
initForms();
renderAll();
</script>

</body>
</html>
```
